<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs | Management Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --vault-blue: #001f3f; --gold: #d4af37; --bg: #ffffff; }
        body { font-family: 'Arial Narrow', sans-serif; background: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
        
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
        .auth-card {
            background: var(--vault-blue); padding: 40px;
            border-radius: 12px; border: 2px solid var(--gold); text-align: center; width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .auth-card h2 { color: var(--gold); margin-bottom: 20px; letter-spacing: 1px; }
        .auth-card input, .auth-card select { 
            width: 100%; height: 45px; padding: 0 15px; margin: 10px 0; 
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); outline: none; font-size: 14px; box-sizing: border-box;
        }
        .auth-btn { 
            background: var(--gold); color: var(--vault-blue); width: 100%; height: 50px; 
            font-weight: bold; border: none; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; margin-top: 15px;
        }

        #loadingScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--vault-blue); color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #mainDashboard { display: none; background: #fff; padding: 10px; width: 100%; box-sizing: border-box; }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #ddd; }
        .btn-nav { text-decoration: none; color: var(--vault-blue); font-weight: bold; border: 1px solid var(--vault-blue); padding: 5px 12px; border-radius: 4px; font-size: 12px; }

        .report-header { text-align: center; margin-bottom: 15px; border-bottom: 3px solid var(--vault-blue); padding-bottom: 10px; }
        .report-header h1 { margin: 0; color: var(--vault-blue); font-size: 22px; text-transform: uppercase; }
        .report-header p { margin: 2px 0 0; font-size: 16px; font-weight: bold; color: #333; }

        .class-section { margin-bottom: 30px; page-break-inside: avoid; }
        .class-title { background: #f0f2f5; color: var(--vault-blue); padding: 8px; font-size: 18px; font-weight: bold; border-left: 10px solid var(--vault-blue); margin-bottom: 5px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; border: 1px solid #000; }
        th { background: var(--vault-blue); color: white; padding: 6px 2px; border: 1px solid #000; text-transform: uppercase; font-size: 10px; }
        td { padding: 4px 3px; border: 1px solid #000; white-space: nowrap; text-align: center; color: #000; }
        
        .sn-col { width: 30px; font-weight: bold; background: #f9f9f9; }
        .name-cell { text-align: left !important; padding-left: 8px; font-weight: bold; min-width: 200px; }
        .calc-col { background: #fff9e6; font-weight: bold; border-left: 2px solid #000; }
        
        .footer-actions { margin: 20px 0; display: flex; justify-content: flex-end; }
        .btn-dl { background: var(--vault-blue); color: white; padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>VAULT LOGIN</h2>
            <input type="text" id="adminName" placeholder="Admin Username">
            <select id="targetSection">
                <option value="jss_students">JUNIOR SECTION (JSS)</option>
                <option value="sss_students">SENIOR SECTION (SSS)</option>
            </select>
            <input type="password" id="adminPin" placeholder="Security PIN">
            <button class="auth-btn" onclick="startLoading()">OPEN VAULT</button>
            <p id="authMsg" style="color: #ffbaba; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <h3 id="loadMsg">SECURE ACCESS INITIATED...</h3>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <a href="index.html" class="btn-nav">← EXIT TO PORTAL</a>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">LOGOUT</button>
        </div>

        <div id="captureArea">
            <div class="report-header">
                <h1>GO-TEGS CONSOLIDATED MASTER LEDGER</h1>
                <p id="dynamicSubtitle">Result Data</p>
            </div>
            <div id="tablesContainer"></div>
        </div>

        <div class="footer-actions">
            <button class="btn-dl" onclick="downloadWidePDF()">📥 DOWNLOAD FULL LEDGER (PDF)</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://lsyegaciprnerysmyesy.supabase.co';
        const SB_KEY = 'sb_publishable_sM0x3SdV4iy8GwYb5S5HUg_S9qLZLeJ';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        let sessionYear = "";
        let sessionTerm = "";
        let currentSectionLabel = "";

        // JSS Mapping
        const jss_codes = {
            english_score: "ENG", maths_score: "MTH", basic_science_score: "BSC", basic_tech_score: "BTH",
            bus_stud_score: "BST", agric_score: "AGS", social_stud_score: "SOS", home_econs_score: "HEC",
            sec_edu_score: "SEC", french_score: "FRE", music_score: "MUS", diction_score: "DIC", 
            history_score: "HIS", lit_score: "LIT", computer_score: "CMP", phe_score: "PHE", cca_score: "CCA"
        };

        // SSS Mapping (Exclusive Subjects)
        const sss_codes = {
            dept: "DEPT", english_score: "ENG", maths_score: "MTH", litineng_score: "LIE", 
            chem_score: "CHM", physics_score: "PHY", bio_score: "BIO", civic_score: "CIV", 
            govt_score: "GOV", econs_score: "ECO", markt_score: "MKT", dp_score: "D.P", 
            comme_score: "COM", agric_score: "AGS", computer_score: "CMP", diction_score: "DIC", catering_c_p_score: "CCP", dic_score: "DIC"
        };

        const blackList = ['is_paid', 'check_count', 'pin', 'year', 'term', 'created_at', 'opened', 'present', 'dob', 'teacher_remark', 'id', 'class'];

        function startLoading() {
            const name = document.getElementById('adminName').value;
            const pin = document.getElementById('adminPin').value;
            const selectEl = document.getElementById('targetSection');
            currentSectionLabel = selectEl.options[selectEl.selectedIndex].text.split(' ')[0]; 

            if(!name || !pin) { document.getElementById('authMsg').innerText = "CREDENTIALS REQUIRED"; return; }
            
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';

            const messages = ["ESTABLISHING SECURE LINK...", "AUTHENTICATING ENCRYPTED VAULT...", "SYNCHRONIZING DATABASE LEDGER..."];
            let i = 0;
            const cycle = setInterval(() => {
                if(i < messages.length) {
                    document.getElementById('loadMsg').innerText = messages[i];
                    i++;
                } else {
                    clearInterval(cycle);
                    unlockVault();
                }
            }, 1300);
        }

        async function unlockVault() {
            const name = document.getElementById('adminName').value;
            const pin = document.getElementById('adminPin').value;
            const table = document.getElementById('targetSection').value;

            const { data } = await _client.from('admin_portal').select('*').eq('admin_name', name).eq('admin_pin', pin).single();

            if(data) {
                sessionYear = data.year || "2025-2026";
                sessionTerm = data.term || "Term";
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                document.getElementById('dynamicSubtitle').innerText = `(${sessionYear} ${sessionTerm} Result Data)`;
                loadData(table);
            } else { location.reload(); alert("ACCESS DENIED"); }
        }

        async function loadData(tableName) {
            const { data } = await _client.from(tableName).select('*').order('class', {ascending: true}).order('full_name', {ascending: true});
            if(!data || !data.length) return;

            const grouped = data.reduce((acc, obj) => {
                const key = obj.class;
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            const container = document.getElementById('tablesContainer');
            container.innerHTML = "";

            // SUBJECT FILTERING LOGIC
            const activeMapping = (tableName === 'sss_students') ? sss_codes : jss_codes;
            let activeKeys = ['full_name', ...Object.keys(activeMapping)];

            for (const className in grouped) {
                const classData = grouped[className];
                let serial = 1;
                const section = document.createElement('div');
                section.className = 'class-section';
                
                let tableHtml = `<div class="class-title">${className}</div>`;
                tableHtml += `<table><thead><tr><th class="sn-col">S/N</th>`;
                
                activeKeys.forEach(k => {
                    tableHtml += `<th>${activeMapping[k] || k.toUpperCase()}</th>`;
                });
                tableHtml += `<th class="calc-col">TOT</th><th class="calc-col">AVG</th><th class="calc-col">GRD</th></tr></thead><tbody>`;

                classData.forEach(row => {
                    let total = 0, count = 0;
                    tableHtml += `<tr><td class="sn-col">${serial++}</td>`;
                    
                    activeKeys.forEach(k => {
                        let val = row[k];
                        let displayVal = "-";
                        
                        if (val !== null && val !== "" && val !== undefined) {
                            displayVal = val;
                            if (k.includes('_score')) {
                                let num = parseFloat(val);
                                if (!isNaN(num)) { total += num; count++; }
                            }
                        }
                        let cellClass = k === 'full_name' ? 'name-cell' : '';
                        tableHtml += `<td class="${cellClass}">${displayVal}</td>`;
                    });

                    const avg = count > 0 ? (total / count).toFixed(1) : 0;
                    tableHtml += `<td class="calc-col">${total}</td><td class="calc-col">${avg}%</td><td class="calc-col">${calculateGrade(avg)}</td></tr>`;
                });

                tableHtml += `</tbody></table>`;
                section.innerHTML = tableHtml;
                container.appendChild(section);
            }
        }

        function calculateGrade(avg) {
            const n = parseFloat(avg);
            if(n >= 75) return "A1"; if(n >= 70) return "B2"; if(n >= 65) return "B3";
            if(n >= 60) return "C4"; if(n >= 50) return "C6"; if(n >= 45) return "D7"; return "F9";
        }

        async function downloadWidePDF() {
            const element = document.getElementById('captureArea');
            const btn = document.querySelector('.btn-dl');
            btn.innerText = "⏳ GENERATING AUDIT PDF...";
            try {
                const canvas = await html2canvas(element, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jspdf.jsPDF('l', 'mm', 'a4'); 
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const ratio = Math.min((pageWidth - 10) / canvas.width, (pageHeight - 10) / canvas.height);
                pdf.addImage(imgData, 'PNG', 5, 5, canvas.width * ratio, canvas.height * ratio);
                pdf.save(`${sessionYear}_${sessionTerm}_${currentSectionLabel}_Ledger.pdf`.replace(/\s+/g, '_'));
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.innerText = "📥 DOWNLOAD FULL LEDGER (PDF)"; }
        }
    </script>
</body>
</html>

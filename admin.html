<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Go-Tegs Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        h2 { color: #004a99; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #004a99; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #003366; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; white-space: nowrap; }
        th { background: #004a99; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f1f1f1; }
        
        .status-paid { color: green; font-weight: bold; }
        .status-unpaid { color: red; font-weight: bold; }
        .loading { text-align: center; padding: 20px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Go-Tegs Result Management System</h2>
        
        <div class="controls">
            <select id="tableSelect">
                <option value="jss_results">Junior Secondary (JSS)</option>
                <option value="sss_results">Senior Secondary (SSS)</option>
            </select>
            <button onclick="fetchData()">🔄 Refresh Data</button>
            <button onclick="window.location.href='index.html'" style="background:#666;">Back to Portal</button>
        </div>

        <div id="loader" class="loading" style="display:none;">Fetching records from Supabase...</div>
        
        <table id="adminTable">
            <thead id="tableHead">
                </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        // Initialize Supabase (Replace with your actual keys)
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            const tableName = document.getElementById('tableSelect').value;
            const loader = document.getElementById('loader');
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHead');

            loader.style.display = 'block';
            tbody.innerHTML = '';
            thead.innerHTML = '';

            try {
                const { data, error } = await supabase
                    .from(tableName)
                    .select('*')
                    .order('full_name', { ascending: true });

                if (error) throw error;

                if (data.length > 0) {
                    // Create Headers based on keys in the first object
                    const headers = Object.keys(data[0]);
                    let headHtml = '<tr>';
                    headers.forEach(h => {
                        headHtml += `<th>${h.replace(/_/g, ' ').toUpperCase()}</th>`;
                    });
                    headHtml += '</tr>';
                    thead.innerHTML = headHtml;

                    // Create Rows
                    data.forEach(row => {
                        let rowHtml = '<tr>';
                        headers.forEach(h => {
                            let val = row[h] === null ? '---' : row[h];
                            
                            // Special formatting for is_paid
                            if (h === 'is_paid') {
                                val = val ? '<span class="status-paid">YES</span>' : '<span class="status-unpaid">NO</span>';
                            }
                            rowHtml += `<td>${val}</td>`;
                        });
                        rowHtml += '</tr>';
                        tbody.innerHTML += rowHtml;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="100%">No records found.</td></tr>';
                }
            } catch (err) {
                alert("Error fetching data: " + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        // Load data on start
        fetchData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Admin - Class Broadsheet</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e5e7eb; margin: 0; padding: 20px; }
        .admin-card { background: white; padding: 25px; border-radius: 12px; max-width: 1200px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Admin Login Area */
        #adminLogin { max-width: 400px; margin: 0 auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        
        button { width: 100%; padding: 14px; background: #b91c1c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #991b1b; }

        /* Broadsheet Area (Landscape) */
        #broadsheetArea { 
            background: white !important; 
            padding: 30px; 
            width: 1100px; /* Wider for Landscape */
            margin: 20px auto;
            border: 2px solid #333;
        }

        .header { text-align: center; border-bottom: 3px solid #b91c1c; margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { color: #b91c1c; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .broadsheet-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .broadsheet-table th, .broadsheet-table td { border: 1px solid #000; padding: 8px; text-align: center; }
        .broadsheet-table th { background: #f3f4f6; color: #b91c1c; font-weight: bold; }
        .subject-cell { text-align: left !important; font-weight: bold; width: 200px; }
        
        .footer-info { margin-top: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        .gen-date { font-size: 14px; color: #444; font-weight: bold; } /* Increased size as requested */

        .action-btns { text-align: center; margin-top: 20px; }
        .dl-btn { background: #059669; width: auto; padding: 12px 25px; }

        @media print {
            .action-btns, #adminLogin { display: none; }
            body { padding: 0; background: white; }
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div id="adminLogin">
            <h2 style="color: #b91c1c;">Class Broadsheet Admin</h2>
            <p>Accessing broadsheet requires a master key.</p>
            <input type="password" id="adminPin" placeholder="Enter Admin Secret PIN">
            <select id="classSelect">
                <option value="">Select Class to Fetch</option>
                <option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option>
                <option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option>
            </select>
            <button onclick="fetchBroadsheet()">Generate Broadsheet</button>
            <p id="statusMsg"></p>
        </div>

        <div id="broadsheetSection" style="display:none;">
            <div id="broadsheetArea">
                <div class="header">
                    <h1>GO-TEGS INTERNATIONAL SCHOOL</h1>
                    <p><strong>OFFICIAL CLASS BROADSHEET - <span id="dispClass"></span></strong></p>
                </div>

                <table class="broadsheet-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Student Full Name</th>
                            <th class="subject-cell">Subject</th>
                            <th>CA (40)</th>
                            <th>Exam (60)</th>
                            <th>Total (%)</th>
                            <th>Grade</th>
                            <th>Remarks/Comments</th>
                        </tr>
                    </thead>
                    <tbody id="broadsheetBody">
                        </tbody>
                </table>

                <div class="footer-info">
                    <div class="gen-date" id="dispTime"></div>
                    <div style="text-align:center;">
                        <div style="border-top: 2px solid #000; width: 200px; margin-bottom: 5px;"></div>
                        <strong>Registrar / Admin Signature</strong>
                    </div>
                </div>
            </div>

            <div class="action-btns">
                <button class="dl-btn" onclick="downloadLandscapePDF()">📥 Download Landscape Broadsheet (PDF)</button>
                <button onclick="location.reload()" style="background:#666; width: auto;">Exit Admin</button>
            </div>
        </div>
    </div>

    <script>
        function getGradeInfo(score) {
            if (score >= 75) return { g: "A1", c: "Outstanding" };
            if (score >= 70) return { g: "B2", c: "Solid" };
            if (score >= 65) return { g: "B3", c: "Productive" };
            if (score >= 60) return { g: "C4", c: "Satisfactory" };
            if (score >= 55) return { g: "C5", c: "Developing" };
            if (score >= 50) return { g: "C6", c: "Fair" };
            if (score >= 45) return { g: "D7", c: "Marginal" };
            if (score >= 40) return { g: "E8", c: "Weak Pass" };
            return { g: "F9", c: "Remedial" };
        }

        async function fetchBroadsheet() {
            const pin = document.getElementById('adminPin').value;
            const cls = document.getElementById('classSelect').value;
            const msg = document.getElementById('statusMsg');

            if(!pin || !cls) { alert("PIN and Class required"); return; }

            msg.innerText = "⏳ Verifying Admin Access...";
            
            try {
                // IMPORTANT: You will need to create a specific API endpoint for this called /api/broadsheet
                const res = await fetch(`/api/broadsheet?admin_pin=${pin}&class=${cls}`);
                const data = await res.json();

                if(res.status !== 200) {
                    msg.style.color = "red";
                    msg.innerText = "❌ Access Denied: " + data.error;
                } else {
                    document.getElementById('adminLogin').style.display = 'none';
                    document.getElementById('broadsheetSection').style.display = 'block';
                    document.getElementById('dispClass').innerText = cls;
                    document.getElementById('dispTime').innerText = "Generated: " + new Date().toLocaleString();

                    let rows = "";
                    // Expecting data to be an array of student scores
                    data.records.forEach(student => {
                        student.scores.forEach((s, index) => {
                            const info = getGradeInfo(s.total_score);
                            rows += `
                                <tr>
                                    <td>${index === 0 ? student.sid : ""}</td>
                                    <td style="text-align:left;">${index === 0 ? student.name : ""}</td>
                                    <td class="subject-cell">${s.subject_name}</td>
                                    <td>${s.ca_score}</td>
                                    <td>${s.exam_score}</td>
                                    <td style="font-weight:bold;">${s.total_score}</td>
                                    <td style="font-weight:bold;">${info.g}</td>
                                    <td style="font-style:italic;">${info.c}</td>
                                </tr>
                            `;
                        });
                    });
                    document.getElementById('broadsheetBody').innerHTML = rows;
                }
            } catch (e) {
                msg.innerText = "❌ Error connecting to server.";
            }
        }

        async function downloadLandscapePDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('broadsheetArea');
            
            try {
                const canvas = await html2canvas(element, { scale: 2 });
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                
                // Set orientation to 'l' for LANDSCAPE
                const pdf = new jsPDF('l', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 10, pdfWidth, pdfHeight);
                pdf.save(`Broadsheet_${document.getElementById('dispClass').innerText}.pdf`);
            } catch (e) {
                alert("Generation failed. Check console.");
            }
        }
    </script>
</body>
</html>

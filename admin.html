<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | SYSTEM OUTPUT</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ff0000; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Control Panel */
        .admin-card { background: #111; padding: 30px; border: 2px solid #ff0000; width: 100%; max-width: 450px; text-align: center; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #ff0000; color: #ff0000; outline: none; }
        .btn-danger { width: 100%; padding: 15px; background: #ff0000; color: #000; border: none; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        
        /* Output Area */
        #output-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
            width: 100%;
        }

        /* The Exact Rectangular Measurement (A4 Ratio) */
        .result-sheet {
            background: white;
            color: black;
            padding: 40px;
            width: 800px; /* Fixed Width */
            min-height: 1050px; /* Fixed Height Ratio */
            box-sizing: border-box;
            border: 10px double #004a99;
            font-family: 'Times New Roman', serif;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
        
        #statusBox { color: #ff0000; margin-top: 10px; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>⚠️ SYSTEM OVERRIDE</h2>
        <input type="text" id="adminName" placeholder="ADMIN NAME...">
        <select id="sectionSelect">
            <option value="">SELECT SECTION</option>
            <option value="JSS">JUNIOR (JSS)</option>
            <option value="SSS">SENIOR (SSS)</option>
        </select>
        <input type="password" id="adminPass" placeholder="ACCESS PIN...">
        <button id="genBtn" class="btn-danger" onclick="generateOutput()">EXECUTE DATA RETRIEVAL</button>
        <div id="statusBox"></div>
    </div>

    <div id="output-container"></div>

    <script>
        async function generateOutput() {
            const name = document.getElementById('adminName').value;
            const section = document.getElementById('sectionSelect').value;
            const pin = document.getElementById('adminPass').value;
            const status = document.getElementById('statusBox');
            const container = document.getElementById('output-container');

            if (!name || !section || !pin) return alert("REQUIRED: AUTH DATA");

            status.style.display = "block";
            status.innerText = ">>> SEARCHING DATABASE...";
            container.innerHTML = ""; // Clear old results

            try {
                const auth = await fetch(`/api/admin-verify?name=${name}&pin=${pin}`);
                if (auth.status !== 200) throw new Error("INVALID CREDENTIALS");

                const res = await fetch(`/api/get-section-results?section=${section}`);
                const students = await res.json();

                if (!students || students.length === 0) throw new Error("NO RECORDS FOUND");

                status.innerText = `>>> DISPLAYING ${students.length} RECORDS...`;

                students.forEach(student => {
                    const sheet = document.createElement('div');
                    sheet.className = 'result-sheet';
                    
                    let rows = (student.scores || []).map(s => `
                        <tr>
                            <td>${s.subject_name}</td>
                            <td style="text-align:center;">${s.score}</td>
                        </tr>
                    `).join('');

                    sheet.innerHTML = `
                        <div style="text-align:center; border-bottom:2px solid #004a99; padding-bottom:10px; margin-bottom:20px;">
                            <h1 style="color:#004a99; font-size:28px; margin:0;">GO-TEGS INTERNATIONAL SCHOOL</h1>
                            <p style="font-weight:bold;">OFFICIAL ACADEMIC REPORT</p>
                        </div>
                        <div style="margin-bottom:20px; font-size:18px;">
                            <strong>NAME:</strong> ${student.full_name}<br>
                            <strong>SECTION:</strong> ${section} | <strong>STUDENT ID:</strong> ${student.student_id}
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>SUBJECT</th>
                                    <th style="text-align:center;">SCORE (%)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows || '<tr><td colspan="2" style="text-align:center;">No data available</td></tr>'}
                            </tbody>
                        </table>
                        <div style="margin-top:50px; text-align:right;">
                            <div style="display:inline-block; border-top:1px solid #000; width:200px; text-align:center;">
                                <p>Principal's Signature</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(sheet);
                });

            } catch (err) {
                status.innerText = ">>> ERROR: " + err.message;
            }
        }
    </script>
</body>
</html>

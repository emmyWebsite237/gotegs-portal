<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs | Management Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root { --vault-blue: #001f3f; --gold: #d4af37; --bg: #ffffff; --cyan-light: #e0f7fa; }
        body { font-family: 'Arial Narrow', sans-serif; background: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Bouncing Shapes Background */
        #bgCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background: linear-gradient(135deg, #ffffff 0%, #f0faff 100%);
        }

        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
        .auth-card {
            background: var(--vault-blue); padding: 40px;
            border-radius: 12px; border: 2px solid var(--gold); text-align: center; width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10001;
        }
        .auth-card h2 { color: var(--gold); margin-bottom: 20px; letter-spacing: 1px; }
        .auth-card input, .auth-card select { 
            width: 100%; height: 45px; padding: 0 15px; margin: 10px 0; 
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); outline: none; font-size: 14px; box-sizing: border-box;
        }
        .auth-btn { 
            background: var(--gold); color: var(--vault-blue); width: 100%; height: 50px; 
            font-weight: bold; border: none; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; margin-top: 15px;
        }

        #loadingScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--vault-blue); color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #mainDashboard { display: none; background: #fff; padding: 10px; width: 100%; box-sizing: border-box; position: relative; z-index: 5; }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #ddd; background: white; }

        /* PDF AREA STYLING */
        #captureArea { background: white !important; padding: 15px; min-width: 980px; }

        .report-header { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 10px; border-bottom: 3px solid var(--vault-blue); padding-bottom: 8px; 
        }
        .header-logo { width: 65px; height: auto; }
        .header-sig { width: 90px; height: auto; }
        .header-text h1 { margin: 0; color: var(--vault-blue); font-family: 'Great Vibes', cursive; font-size: 36px; }
        .header-text p { margin: 2px 0 0; font-size: 13px; font-weight: bold; color: #333; text-transform: uppercase; }

        .class-section { margin-bottom: 20px; page-break-inside: avoid; }
        .class-title { background: #f0f2f5; color: var(--vault-blue); padding: 5px; font-size: 15px; font-weight: bold; border-left: 6px solid var(--vault-blue); margin-bottom: 4px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; border: 1px solid #000; }
        th { background: var(--vault-blue); color: white; padding: 4px 1px; border: 1px solid #000; font-size: 8px; }
        td { padding: 3px 2px; border: 1px solid #000; white-space: nowrap; text-align: center; color: #000; }
        
        .sn-col { width: 20px; font-weight: bold; }
        
        /* STRICTLY REDUCED NAME COLUMN */
        .name-cell { 
            text-align: left !important; 
            padding-left: 4px !important; 
            font-weight: bold; 
            width: 130px !important; /* Fixed narrow width */
            max-width: 130px !important;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .calc-col { background: #fff9e6; font-weight: bold; border-left: 1px solid #000; }
        .btn-dl { background: var(--vault-blue); color: white; padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .canvas-clone { position: absolute !important; left: -9999px !important; width: 1000px !important; background: white !important; }

        @media screen and (max-width: 800px) { #captureArea { overflow-x: auto; min-width: unset; } }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>VAULT LOGIN</h2>
            <input type="text" id="adminName" placeholder="Admin Username">
            <select id="targetSection">
                <option value="jss_students">JUNIOR SECTION (JSS)</option>
                <option value="sss_students">SENIOR SECTION (SSS)</option>
            </select>
            <input type="password" id="adminPin" placeholder="Security PIN">
            <button class="auth-btn" onclick="startLoading()">OPEN VAULT</button>
            <p id="authMsg" style="color: #ffbaba; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="loadingScreen">
        <h3 id="loadMsg">SECURE ACCESS INITIATED...</h3>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <a href="index.html" style="text-decoration:none; color:var(--vault-blue); font-weight:bold;">← EXIT</a>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">LOGOUT</button>
        </div>

        <div id="captureArea">
            <div class="report-header">
                <img src="assets/logo.webp" class="header-logo" alt="Logo">
                <div class="header-text" style="text-align:center; flex-grow:1;">
                    <h1>Go-Tegs International School</h1>
                    <p id="dynamicSubtitle">CONSOLIDATED MASTER LEDGER</p>
                </div>
                <img src="assets/signature.png" class="header-sig" alt="Signature">
            </div>
            <div id="tablesContainer"></div>
        </div>

        <div style="margin: 20px 0; display: flex; justify-content: flex-end;">
            <button id="mainDownloadBtn" class="btn-dl" onclick="downloadWidePDF()">📥 DOWNLOAD PDF</button>
        </div>
    </div>

    <script>
        // --- BOUNCING SHAPES ANIMATION ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            shapes = [];
            for(let i = 0; i < 15; i++) {
                shapes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 40 + 20,
                    dx: (Math.random() - 0.5) * 1.5,
                    dy: (Math.random() - 0.5) * 1.5,
                    rot: Math.random() * Math.PI * 2,
                    rotV: (Math.random() - 0.5) * 0.02,
                    type: Math.floor(Math.random() * 3) // 0: Square, 1: Circle, 2: Triangle
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 188, 212, 0.2)"; // Cyan
            ctx.lineWidth = 2;

            shapes.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.rot);
                ctx.beginPath();
                if(s.type === 0) ctx.rect(-s.size/2, -s.size/2, s.size, s.size);
                else if(s.type === 1) ctx.arc(0, 0, s.size/2, 0, Math.PI*2);
                else {
                    ctx.moveTo(0, -s.size/2);
                    ctx.lineTo(s.size/2, s.size/2);
                    ctx.lineTo(-s.size/2, s.size/2);
                    ctx.closePath();
                }
                ctx.stroke();
                ctx.restore();

                s.x += s.dx; s.y += s.dy; s.rot += s.rotV;
                if(s.x < 0 || s.x > canvas.width) s.dx *= -1;
                if(s.y < 0 || s.y > canvas.height) s.dy *= -1;
            });
            requestAnimationFrame(draw);
        }
        initCanvas(); draw();
        window.onresize = initCanvas;

        // --- VAULT LOGIC ---
        const SB_URL = 'https://lsyegaciprnerysmyesy.supabase.co';
        const SB_KEY = 'sb_publishable_sM0x3SdV4iy8GwYb5S5HUg_S9qLZLeJ';
        const _client = supabase.createClient(SB_URL, SB_KEY);
        let sessionYear = "", sessionTerm = "", preRenderedPDF = null;

        const jss_codes = { english_score:"ENG", maths_score:"MTH", basic_science_score:"BSC", basic_tech_score:"BTH", bus_stud_score:"BST", agric_score:"AGS", social_stud_score:"SOS", home_econs_score:"HEC", sec_edu_score:"SEC", french_score:"FRE", music_score:"MUS", diction_score:"DIC", history_score:"HIS", lit_score:"LIT", computer_score:"CMP", phe_score:"PHE", cca_score:"CCA" };
        const sss_codes = { dept:"DEPT", maths_score:"MTH", english_score:"ENG", civic_score:"CIV", physics_score:"PHY", chem_score:"CHM", bio_score:"BIO", fmath_score:"FMT", dp_score:"D.P", econs_score:"ECO", agric_score:"AGS", crs_score:"CRS", catering_c_p_score:"CAT", dic_score:"DIC" };

        function startLoading() {
            if(!document.getElementById('adminName').value || !document.getElementById('adminPin').value) return;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';
            setTimeout(unlockVault, 2000);
        }

        async function unlockVault() {
            const name = document.getElementById('adminName').value;
            const pin = document.getElementById('adminPin').value;
            const table = document.getElementById('targetSection').value;
            const { data } = await _client.from('admin_portal').select('*').eq('admin_name', name).eq('admin_pin', pin).single();

            if(data) {
                sessionYear = data.year || "2025-2026";
                sessionTerm = data.term || "Term";
                document.getElementById('bgCanvas').style.display = 'none';
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                document.getElementById('dynamicSubtitle').innerText = `${sessionYear} ${sessionTerm} Result Ledger`;
                loadData(table);
            } else { location.reload(); }
        }

        async function loadData(tableName) {
            const { data } = await _client.from(tableName).select('*').order('class').order('full_name');
            if(!data) return;
            const grouped = data.reduce((acc, obj) => {
                const key = obj.class || "Unclassed";
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            const container = document.getElementById('tablesContainer');
            container.innerHTML = "";
            const activeMapping = (tableName === 'sss_students') ? sss_codes : jss_codes;
            let activeKeys = ['full_name', ...Object.keys(activeMapping)];

            for (const className in grouped) {
                const classData = grouped[className];
                let serial = 1;
                let tableHtml = `<div class="class-section"><div class="class-title">${className}</div><table><thead><tr><th class="sn-col">S/N</th>`;
                activeKeys.forEach(k => tableHtml += `<th>${activeMapping[k] || k.toUpperCase()}</th>`);
                tableHtml += `<th class="calc-col">TOT</th><th class="calc-col">AVG</th><th class="calc-col">GRD</th></tr></thead><tbody>`;

                classData.forEach(row => {
                    let total = 0, count = 0;
                    tableHtml += `<tr><td class="sn-col">${serial++}</td>`;
                    activeKeys.forEach(k => {
                        let val = row[k] || "-";
                        if (k.endsWith('_score') && !isNaN(parseFloat(val))) { total += parseFloat(val); count++; }
                        tableHtml += `<td class="${k==='full_name'?'name-cell':''}">${val}</td>`;
                    });
                    const avg = count > 0 ? (total / count).toFixed(1) : 0;
                    tableHtml += `<td class="calc-col">${total}</td><td class="calc-col">${avg}%</td><td class="calc-col">${avg >= 75 ? "A1" : avg >= 70 ? "B2" : avg >= 65 ? "B3" : avg >= 60 ? "C4" : avg >= 50 ? "C6" : avg >= 45 ? "D7" : "F9"}</td></tr>`;
                });
                container.innerHTML += tableHtml + `</tbody></table></div>`;
            }
        }

        async function prepareLedgerPDF() {
            const originalArea = document.getElementById('captureArea');
            const clone = originalArea.cloneNode(true);
            clone.classList.add('canvas-clone');
            document.body.appendChild(clone);

            const canvasPDF = await html2canvas(clone, { scale: 2, useCORS: true, width: 1000 });
            const imgData = canvasPDF.toDataURL('image/jpeg', 0.95);
            const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const ratio = (pdfWidth - 10) / canvasPDF.width;
            pdf.addImage(imgData, 'JPEG', 5, 5, canvasPDF.width * ratio, canvasPDF.height * ratio);
            preRenderedPDF = pdf.output('blob');
            document.body.removeChild(clone);
        }

        async function downloadWidePDF() {
            const btn = document.getElementById('mainDownloadBtn');
            if (preRenderedPDF) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(preRenderedPDF);
                link.download = `Ledger_${sessionYear}.pdf`;
                link.click();
                return;
            }
            btn.innerText = "⏳ GENERATING...";
            await prepareLedgerPDF();
            btn.innerText = "📥 DOWNLOAD PDF";
            downloadWidePDF();
        }
    </script>
</body>
</html>

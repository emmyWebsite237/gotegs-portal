<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h2 { color: #004a99; border-left: 5px solid #004a99; padding-left: 15px; margin-bottom: 20px; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 13px; }
        th { background: #004a99; color: white; padding: 12px; text-align: left; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
        tr:hover { background: #f9f9f9; }

        .btn-refresh { background: #004a99; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .status-paid { color: #059669; font-weight: bold; background: #ecfdf5; padding: 4px 8px; border-radius: 4px; }
        .status-unpaid { color: #dc2626; font-weight: bold; background: #fef2f2; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Go-Tegs Student Database Management</h1>
    <button class="btn-refresh" onclick="loadAllData()">🔄 Refresh All Data</button>

    <div class="admin-card">
        <h2>Junior Secondary School (JSS) Records</h2>
        <div class="table-container">
            <table id="jssTable">
                <thead><tr id="jssHead"></tr></thead>
                <tbody id="jssBody"><tr><td>Loading JSS data...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="admin-card">
        <h2>Senior Secondary School (SSS) Records</h2>
        <div class="table-container">
            <table id="sssTable">
                <thead><tr id="sssHead"></tr></thead>
                <tbody id="sssBody"><tr><td>Loading SSS data...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- CONFIGURE YOUR SUPABASE HERE ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadTableData(tableName, headId, bodyId) {
            const headRow = document.getElementById(headId);
            const body = document.getElementById(bodyId);

            try {
                const { data, error } = await supabase.from(tableName).select('*').order('full_name', { ascending: true });
                if (error) throw error;

                if (data.length > 0) {
                    // 1. Generate Headers Dynamically
                    const columns = Object.keys(data[0]);
                    headRow.innerHTML = columns.map(col => `<th>${col.toUpperCase().replace('_', ' ')}</th>`).join('');

                    // 2. Generate Rows
                    body.innerHTML = data.map(row => {
                        return `<tr>${columns.map(col => {
                            let value = row[col] === null ? "---" : row[col];
                            if (col === 'is_paid') {
                                return `<td><span class="${value ? 'status-paid' : 'status-unpaid'}">${value ? 'YES' : 'NO'}</span></td>`;
                            }
                            return `<td>${value}</td>`;
                        }).join('')}</tr>`;
                    }).join('');
                } else {
                    body.innerHTML = "<tr><td>No records found in this table.</td></tr>";
                }
            } catch (err) {
                body.innerHTML = `<tr><td style="color:red;">Error: ${err.message}</td></tr>`;
            }
        }

        function loadAllData() {
            // Replace 'jss_students' and 'sss_students' with your actual Supabase table names
            loadTableData('jss_students', 'jssHead', 'jssBody');
            loadTableData('sss_students', 'sssHead', 'sssBody');
        }

        // Initial Load
        window.onload = loadAllData;
    </script>
</body>
</html>

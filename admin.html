<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs | Admin Bulk Export</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #dc2626; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        .btn-bulk { width: 100%; padding: 15px; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-bulk:hover { background: #b91c1c; }
        .btn-bulk:disabled { background: #9ca3af; cursor: not-allowed; }

        #statusBox { margin-top: 20px; padding: 15px; border-radius: 6px; font-size: 14px; display: none; background: #fef2f2; border: 1px solid #fee2e2; color: #991b1b; }
        
        /* Hidden area for generating results */
        #render-container { position: absolute; left: -9999px; top: 0; width: 850px; }
        
        /* Apply your result CSS here so the PDF looks identical */
        .pdf-page-template { background: white; padding: 25px; border: 5px double #004a99; width: 800px; min-height: 1050px; box-sizing: border-box; position: relative; }
    </style>
</head>
<body>

    <div class="admin-card">
        <img src="./assets/logo.webp" style="width: 80px;" onerror="this.src='https://wordpress.com'">
        <h2>Master Admin Portal</h2>
        <p style="font-size: 14px; color: #666;">Generate all student results into a single PDF document.</p>
        
        <input type="password" id="adminPass" placeholder="Enter Master Passcode">
        <button id="genBtn" class="btn-bulk" onclick="startBulkGeneration()">🚀 GENERATE ALL RESULTS</button>
        
        <div id="statusBox"></div>
        <a href="index.html" style="display:block; margin-top: 20px; color: #666; font-size: 13px; text-decoration: none;">← Back to Portal</a>
    </div>

    <div id="render-container"></div>

    <script>
        async function startBulkGeneration() {
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('statusBox');

            if (!pass) return alert("Please enter the admin passcode");

            btn.disabled = true;
            status.style.display = "block";
            status.innerText = "⏳ Verifying Admin Credentials...";

            try {
                // 1. Verify Admin (Matches your Supabase table 'admin_portal')
                const auth = await fetch(`/api/admin-verify?pin=${pass}`);
                if (auth.status !== 200) {
                    status.innerText = "❌ Unauthorized: Invalid Admin PIN";
                    btn.disabled = false;
                    return;
                }

                // 2. Fetch all student records
                status.innerText = "📂 Fetching all records from database...";
                const res = await fetch(`/api/get-all-results`);
                const allData = await res.json();

                if (!allData || allData.length === 0) {
                    status.innerText = "❌ No student data found.";
                    btn.disabled = false;
                    return;
                }

                // 3. Setup PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const container = document.getElementById('render-container');

                for (let i = 0; i < allData.length; i++) {
                    const student = allData[i];
                    status.innerText = `📄 Processing (${i + 1}/${allData.length}): ${student.full_name}`;

                    // Create HTML for this student
                    const wrapper = document.createElement('div');
                    wrapper.className = "pdf-page-template";
                    wrapper.innerHTML = generateResultHTML(student);
                    container.appendChild(wrapper);

                    // Capture to Image
                    const canvas = await html2canvas(wrapper, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const imgHeight = (canvas.height * pdfWidth) / canvas.width;

                    if (i > 0) pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, imgHeight);

                    // Clear memory
                    container.innerHTML = "";
                }

                pdf.save(`GoTegs_Master_Results_${new Date().getFullYear()}.pdf`);
                status.style.background = "#f0fdf4";
                status.style.borderColor = "#dcfce7";
                status.style.color = "#166534";
                status.innerText = "✅ Success! Master PDF downloaded.";
                btn.disabled = false;

            } catch (err) {
                console.error(err);
                status.innerText = "❌ Error: Could not generate PDF. Check console.";
                btn.disabled = false;
            }
        }

        // This function builds the EXACT same HTML as your index.html
        function generateResultHTML(data) {
            // Logic to calculate scores same as student portal
            let rows = "";
            let total = 0;
            data.scores.forEach(s => {
                total += s.score;
                rows += `<tr>
                    <td style="border:1px solid #000; padding:8px;">${s.subject_name}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${s.score}</td>
                </tr>`;
            });
            const mean = (total / data.scores.length).toFixed(1);

            // Returns the template string (trimmed version of your #pdfArea)
            return `
                <div style="text-align:center;">
                    <img src="./assets/logo.webp" style="width:80px;">
                    <h1 style="color:#004a99; margin:5px 0;">GO-TEGS INTERNATIONAL SCHOOL</h1>
                    <p style="font-size:12px; font-weight:bold;">15, Ayesanmi Street, Lagos, Nigeria</p>
                    <hr border="1">
                    <h3 style="text-transform:uppercase;">REPORT SHEET: ${data.full_name}</h3>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:14px;">
                    <div><strong>ID:</strong> ${data.student_id}</div>
                    <div><strong>Class:</strong> ${data.class_name}</div>
                </div>
                <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                    <thead><tr style="background:#eef2f7;">
                        <th style="border:1px solid #000; padding:8px;">Subject</th>
                        <th style="border:1px solid #000; padding:8px;">Score</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div style="margin-top:20px; font-weight:bold;">Average: ${mean}%</div>
                <div style="margin-top:50px; border-top:2px solid #000; width:200px; text-align:center; float:right;">
                    Principal's Signature
                </div>
            `;
        }
    </script>
</body>
</html>

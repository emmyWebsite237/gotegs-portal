<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL | RESTRICTED ACCESS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ff0000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #111; padding: 40px; border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255,0,0,0.3); width: 450px; text-align: center; position: relative; }
        .admin-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 12px; background: repeating-linear-gradient(45deg, #ff0000, #ff0000 10px, #000 10px, #000 20px); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #ff0000; color: #ff0000; outline: none; box-sizing: border-box; }
        .btn-danger { width: 100%; padding: 20px; background: #ff0000; color: #000; border: none; cursor: pointer; font-weight: 900; text-transform: uppercase; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        .btn-danger:hover { background: #fff; color: #ff0000; }
        #statusBox { margin-top: 20px; padding: 15px; border: 1px dashed #ff0000; font-size: 12px; display: none; text-align: left; }
        #render-stack { position: absolute; left: -9999px; top: 0; width: 800px; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>⚠️ SYSTEM OVERRIDE</h2>
        <input type="text" id="adminName" placeholder="IDENTIFY ADMIN NAME...">
        <select id="sectionSelect">
            <option value="">SELECT CLEARANCE LEVEL</option>
            <option value="JSS">JUNIOR SECONDARY (JSS)</option>
            <option value="SSS">SENIOR SECONDARY (SSS)</option>
        </select>
        <input type="password" id="adminPass" placeholder="ENTER ACCESS PIN...">
        <button id="genBtn" class="btn-danger" onclick="startBulkGeneration()">⚠️ EXECUTE MASTER EXPORT</button>
        <div id="statusBox"></div>
    </div>

    <div id="render-stack"></div>

    <script>
        async function startBulkGeneration() {
            const name = document.getElementById('adminName').value;
            const section = document.getElementById('sectionSelect').value;
            const pin = document.getElementById('adminPass').value;
            const status = document.getElementById('statusBox');
            const btn = document.getElementById('genBtn');

            if(!name || !section || !pin) return alert("MISSING DATA");

            btn.disabled = true;
            status.style.display = "block";
            status.innerText = ">>> AUTHENTICATING...";

            try {
                const auth = await fetch(`/api/admin-verify?name=${name}&pin=${pin}`);
                if (auth.status !== 200) throw new Error("UNAUTHORIZED");

                status.innerText = ">>> FETCHING DATA...";
                const res = await fetch(`/api/get-section-results?section=${section}`);
                const students = await res.json();

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const stack = document.getElementById('render-stack');

                for (let i = 0; i < students.length; i++) {
                    status.innerText = `>>> COMPILING [${i+1}/${students.length}]: ${students[i].full_name}`;
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = createProfessionalResult(students[i], section);
                    stack.appendChild(tempDiv);

                    const canvas = await html2canvas(tempDiv, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    if (i > 0) pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                    stack.innerHTML = "";
                }

                pdf.save(`GoTegs_${section}_Export.pdf`);
                status.innerText = ">>> EXPORT COMPLETE.";
            } catch (err) {
                status.innerText = ">>> ERROR: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        function createProfessionalResult(data, section) {
            let rows = (data.scores || []).map(s => `
                <tr>
                    <td style="border:1px solid #000; padding:8px;">${s.subject_name}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:center;">${s.score}</td>
                </tr>
            `).join('');

            return `
                <div style="background:white; color:black; padding:40px; width:800px; min-height:1050px; font-family: serif; border: 8px double #004a99;">
                    <center>
                        <h1 style="color:#004a99; margin:0;">GO-TEGS INTERNATIONAL SCHOOL</h1>
                        <p>Academic Report Card</p>
                    </center>
                    <hr>
                    <p><strong>Name:</strong> ${data.full_name} | <strong>Class:</strong> ${data.class}</p>
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr style="background:#eee;"><th>Subject</th><th>Score</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs | Management Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        :root { 
            --vault-blue: #001f3f; 
            --gold: #d4af37; 
            --glass: rgba(0, 31, 63, 0.7);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #ffffff; margin: 0; padding: 0; overflow-x: hidden; 
        }
        
        /* Background & Matrix Layers */
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fff; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; background: #000; display: none; }

        /* Auth Layer */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; padding: 20px; box-sizing: border-box;
        }

        #warningContainer { text-align: center; margin-bottom: 20px; }
        #warningText {
            color: #ff4444; font-weight: bold; font-size: 18px; min-height: 1.2em;
            text-shadow: 0 0 10px rgba(0,0,0,0.5); margin-bottom: 15px;
        }

        .back-btn {
            display: none; background: #ff4444; color: white; border: none; 
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-weight: bold; text-decoration: none; font-size: 13px; transition: 0.3s;
        }
        .back-btn:hover { background: #cc0000; }

        .auth-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.4); 
            text-align: center; width: 100%; max-width: 360px; box-sizing: border-box;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0; display: none; transition: opacity 1s ease;
        }

        .auth-card input, .auth-card select { 
            width: 100%; height: 45px; padding: 0 15px; margin: 10px 0; 
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box;
        }
        .auth-btn { 
            background: var(--gold); color: var(--vault-blue); width: 100%; height: 50px; 
            font-weight: bold; border: none; cursor: pointer; border-radius: 4px; margin-top: 15px;
        }

        /* Fragments */
        .fragment { position: fixed; background: white; z-index: 10001; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.1); }

        /* Dashboard & Mobile Adjustments */
        #mainDashboard { display: none; background: #fff; width: 100%; }
        .nav-bar { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; align-items: center; }
        
        /* The "Mobile Fix" Wrapper */
        .table-responsive-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #captureArea { background: white !important; padding: 15px; min-width: 1050px; }

        table { width: 100%; border-collapse: collapse; font-size: 11.5px; border: 1px solid #000; }
        th { background: var(--vault-blue); color: white; padding: 5px; border: 1px solid #000; font-size: 8.5px; }
        td { padding: 3px; border: 1px solid #000; text-align: center; color: #000; }
        .name-cell { text-align: left !important; padding-left: 5px; font-weight: bold; width: 180px; }

        @media screen and (max-width: 600px) {
            .auth-card { padding: 25px; }
            #warningText { font-size: 16px; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <canvas id="matrixCanvas"></canvas>

    <div id="authOverlay">
        <div id="warningContainer">
            <div id="warningText"></div>
            <a href="index.html" class="back-btn" id="goBackBtn">← RETURN TO PORTAL</a>
        </div>
        
        <div class="auth-card" id="loginCard">
            <h2 style="color:var(--gold); margin-top:0;">VAULT LOGIN</h2>
            <input type="text" id="adminName" placeholder="Admin Username">
            <select id="targetSection">
                <option value="jss_students">JUNIOR SECTION (JSS)</option>
                <option value="sss_students">SENIOR SECTION (SSS)</option>
            </select>
            <input type="password" id="adminPin" placeholder="Security PIN">
            <button class="auth-btn" onclick="validateAuth()">OPEN VAULT</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <a href="index.html" style="text-decoration:none; color:var(--vault-blue); font-weight:bold; border:1px solid; padding:5px 10px; border-radius:4px; font-size:12px;">← EXIT</a>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">LOGOUT</button>
        </div>

        <div class="table-responsive-wrapper">
            <div id="captureArea">
                <div style="display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--vault-blue); padding-bottom:10px;">
                    <img src="assets/logo.webp" style="width:70px;" alt="Logo">
                    <div style="text-align:center;">
                        <h1 style="margin:0; color:var(--vault-blue); font-family:'Great Vibes', cursive; font-size:38px;">Go-Tegs International School</h1>
                        <p style="margin:2px 0; font-weight:bold; text-transform:uppercase;">CONSOLIDATED MASTER LEDGER</p>
                    </div>
                    <img src="assets/signature.png" style="width:100px;" alt="Sig">
                </div>
                <div id="tablesContainer"></div>
            </div>
        </div>

        <div style="text-align:center; padding:20px;">
            <button id="mainDownloadBtn" onclick="downloadWidePDF()" style="background:var(--vault-blue); color:white; padding:15px 30px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">📥 DOWNLOAD FULL LEDGER (PDF)</button>
        </div>
    </div>

    <script>
        // --- restored: TYPEWRITER & SEQUENCE ---
        const warnElement = document.getElementById("warningText");
        const warnMsg = "Warning: Access restricted. If you are not an administrator, please return immediately.";
        let charIndex = 0;

        function typeWarning() {
            if (charIndex < warnMsg.length) {
                warnElement.textContent += warnMsg.charAt(charIndex);
                charIndex++;
                setTimeout(typeWarning, 50);
            } else {
                // finished typing
                document.getElementById('goBackBtn').style.display = 'inline-block';
                // wait 2 seconds then show login
                setTimeout(() => {
                    const card = document.getElementById('loginCard');
                    card.style.display = 'block';
                    setTimeout(() => card.style.opacity = '1', 50);
                }, 2000);
            }
        }
        window.onload = () => { initShapes(); animateShapes(); typeWarning(); };

        // --- restored: BOUNCING SHAPES ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        function initShapes() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 15; i++) {
                shapes.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 30 + 20, dx: (Math.random() - 0.5) * 2, dy: (Math.random() - 0.5) * 2,
                    color: Math.random() > 0.5 ? 'rgba(0, 255, 255, 0.15)' : 'rgba(200, 200, 200, 0.2)',
                    type: Math.floor(Math.random() * 3)
                });
            }
        }
        function animateShapes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            shapes.forEach(s => {
                ctx.fillStyle = s.color; ctx.beginPath();
                if (s.type === 0) ctx.rect(s.x, s.y, s.size, s.size);
                else if (s.type === 1) ctx.arc(s.x, s.y, s.size/2, 0, Math.PI*2);
                else { ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + s.size, s.y); ctx.lineTo(s.x + s.size/2, s.y - s.size); }
                ctx.fill(); s.x += s.dx; s.y += s.dy;
                if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
                if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
            });
            requestAnimationFrame(animateShapes);
        }

        // --- restored: MATRIX RAIN ---
        function runMatrixEffect(callback) {
            const mCanvas = document.getElementById('matrixCanvas');
            const mCtx = mCanvas.getContext('2d');
            mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
            mCanvas.style.display = 'block';
            let drops = Array(Math.floor(mCanvas.width/20)).fill(1);
            const matrixInterval = setInterval(() => {
                mCtx.fillStyle = "rgba(0, 0, 0, 0.05)"; mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
                mCtx.fillStyle = "#0F0"; mCtx.font = "20px monospace";
                drops.forEach((y, i) => {
                    mCtx.fillText(Math.floor(Math.random()*10), i*20, y*20);
                    if(y*20 > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 50);
            setTimeout(() => { clearInterval(matrixInterval); mCanvas.style.display = 'none'; callback(); }, 3000);
        }

        // --- AUTH & FRAGMENTS ---
        const SB_URL = 'https://lsyegaciprnerysmyesy.supabase.co';
        const SB_KEY = 'sb_publishable_sM0x3SdV4iy8GwYb5S5HUg_S9qLZLeJ';
        const _client = supabase.createClient(SB_URL, SB_KEY);

        async function validateAuth() {
            const name = document.getElementById('adminName').value;
            const pin = document.getElementById('adminPin').value;
            const { data } = await _client.from('admin_portal').select('*').eq('admin_name', name).eq('admin_pin', pin).single();
            if(data) {
                document.getElementById('authOverlay').style.display = 'none';
                runMatrixEffect(() => {
                    createFragmentTransition();
                    loadData(document.getElementById('targetSection').value);
                    document.getElementById('mainDashboard').style.display = 'block';
                });
            } else { alert("ACCESS DENIED"); }
        }

        function createFragmentTransition() {
            for(let i=0; i<30; i++){
                let f = document.createElement('div'); f.className = 'fragment';
                f.style.width = (Math.random()*80+20)+'px'; f.style.height = f.style.width;
                f.style.left = (Math.random()*100)+'vw'; f.style.top = '-100px';
                document.body.appendChild(f);
                f.animate([{top:'-100px', opacity:1}, {top:'100vh', opacity:0, transform:'rotate(360deg)'}], 
                {duration: 1000+Math.random()*1000, easing:'ease-in'}).onfinish = () => f.remove();
            }
        }

        // --- DATA LOADING ---
        async function loadData(tableName) {
            const { data } = await _client.from(tableName).select('*').order('class').order('full_name');
            const container = document.getElementById('tablesContainer');
            container.innerHTML = "";
            const mapping = tableName === 'sss_students' ? 
                { dept: "DEPT", maths_score: "MTH", english_score: "ENG", civic_score: "CIV", physics_score: "PHY", chem_score: "CHM", bio_score: "BIO", fmath_score: "FMT", dp_score: "D.P", econs_score: "ECO", agric_score: "AGS", crs_score: "CRS", catering_c_p_score: "CAT", dic_score: "DIC" } :
                { english_score: "ENG", maths_score: "MTH", basic_science_score: "BSC", basic_tech_score: "BTH", bus_stud_score: "BST", agric_score: "AGS", social_stud_score: "SOS", home_econs_score: "HEC", sec_edu_score: "SEC", french_score: "FRE", music_score: "MUS", diction_score: "DIC", history_score: "HIS", lit_score: "LIT", computer_score: "CMP", phe_score: "PHE", cca_score: "CCA" };

            const grouped = data.reduce((acc, obj) => {
                const key = obj.class || "Unclassed";
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj); return acc;
            }, {});

            for (const className in grouped) {
                let html = `<div style="margin-bottom:20px;"><div style="background:#f0f2f5; padding:8px; border-left:8px solid var(--vault-blue); font-weight:bold; margin:10px 0;">${className}</div><table><thead><tr><th>S/N</th><th>NAME</th>`;
                Object.values(mapping).forEach(v => html += `<th>${v}</th>`);
                html += `<th>TOT</th><th>AVG</th><th>GRD</th></tr></thead><tbody>`;
                grouped[className].forEach((row, idx) => {
                    let total = 0, count = 0;
                    html += `<tr><td>${idx+1}</td><td class="name-cell">${row.full_name}</td>`;
                    Object.keys(mapping).forEach(k => {
                        let val = row[k] || "-";
                        html += `<td>${val}</td>`;
                        if(k.includes('score') && !isNaN(val) && val !== "-") { total += parseFloat(val); count++; }
                    });
                    const avg = count > 0 ? (total/count).toFixed(1) : 0;
                    html += `<td style="background:#fff9e6; font-weight:bold;">${total}</td><td style="background:#fff9e6; font-weight:bold;">${avg}%</td><td style="background:#fff9e6; font-weight:bold;">${calculateGrade(avg)}</td></tr>`;
                });
                container.innerHTML += html + `</tbody></table></div>`;
            }
        }

        function calculateGrade(avg) {
            if(avg >= 75) return "A1"; if(avg >= 70) return "B2"; if(avg >= 65) return "B3";
            if(avg >= 60) return "C4"; if(avg >= 50) return "C6"; if(avg >= 45) return "D7"; return "F9";
        }

        async function downloadWidePDF() {
            const btn = document.getElementById('mainDownloadBtn'); btn.innerText = "⏳ PROCESSING...";
            const capture = document.getElementById('captureArea');
            const canvas = await html2canvas(capture, { scale: 2 });
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const ratio = (pdfWidth - 20) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 10, 10, canvas.width * ratio, canvas.height * ratio);
            pdf.save(`GoTegs_Ledger.pdf`);
            btn.innerText = "📥 DOWNLOAD FULL LEDGER (PDF)";
        }
    </script>
</body>
</html>

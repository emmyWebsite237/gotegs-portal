<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    
    <style>
        /* General Page Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 850px; position: relative; }
        
        /* Input Section Styling */
        #loginSection { max-width: 400px; margin: 0 auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        /* Button & Rolling Loader */
        button { width: 100%; padding: 14px; background: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; position: relative; display: flex; align-items: center; justify-content: center; min-height: 50px; transition: 0.3s; }
        button:hover { background: #003366; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
        .loading { pointer-events: none; opacity: 0.8; }

        /* RESULT TEMPLATE STYLING */
        #pdfArea { 
            padding: 40px; 
            background: white !important; 
            border: 5px double #004a99; 
            margin: 10px auto;
            position: relative;
            min-height: 950px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Logo Watermark Only */
        #pdfArea::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; background-image: url('./assets/logo.webp'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.08; z-index: 0; pointer-events: none; }
        
        .report-header, .student-info, .result-table, .summary-table, .footer { position: relative; z-index: 1; }
        .report-header { text-align: center; border-bottom: 2px solid #004a99; padding-bottom: 10px; margin-bottom: 30px; }
        .school-name { font-family: 'Times New Roman', serif; font-size: 32px; color: #004a99; margin: 0; text-transform: uppercase; }
        
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        .result-table th { background: #eef2f7; color: #004a99; }
        
        .summary-table { width: 50%; margin-top: 25px; margin-left: auto; border-collapse: collapse; }
        .summary-table td { border: 1px solid #000; padding: 10px; font-weight: bold; }

        .footer { margin-top: auto; padding-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-space { text-align: center; width: 200px; }
        .sig-line { border-top: 2px solid #000; margin-bottom: 5px; }
        .timestamp { font-size: 11px; color: #777; font-style: italic; }

        /* CELEBRATION SPLASH BOX */
        #splashBox {
            display: none; position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            width: 260px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000; text-align: center; color: white; animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { right: -350px; opacity: 0; } to { right: 20px; opacity: 1; } }
        .splash-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
        .splash-comment { font-size: 16px; line-height: 1.4; }

        .action-btns { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .download-btn { background: #16a34a; }
        .back-btn { background: #6b7280; }
        #msg { text-align: center; font-weight: bold; margin-top: 20px; font-size: 16px; }

        @media screen and (max-width: 600px) {
            #pdfArea { width: 800px; transform: scale(0.42); transform-origin: top left; margin-bottom: -550px; }
            .card { overflow-x: auto; padding: 15px; }
        }

        @media print {
            .action-btns, #loginSection, #msg, #splashBox { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="loginSection">
            <img src="./assets/logo.webp" style="width: 120px;" onerror="this.src='https://wordpress.com'">
            <h3 style="color: #004a99;">Student Result Portal</h3>
            <input type="text" id="sid" placeholder="Student ID (GT/...)">
            
            <select id="yearSelect">
                <option value="">Select Session</option>
                <option value="2023/2024">2023/2024</option> <!-- UPDATED HERE -->
                <option value="2024/2025">2024/2025</option>
            </select>

            <select id="classSelect" onchange="toggleDept()">
                <option value="">Select Class</option>
                <option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option>
                <option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option>
            </select>

            <div id="deptDiv" style="display:none;">
                <select id="deptSelect">
                    <option value="">Select Department</option>
                    <option value="Science">Science</option><option value="Art">Art</option><option value="Commerce">Commerce</option>
                </select>
            </div>

            <input type="password" id="pin" placeholder="Access PIN">
            <button id="checkBtn" onclick="check()">
                <span class="btn-text">Check Result</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div id="resultSection" style="display:none;">
            <div id="pdfArea">
                <div class="report-header">
                    <img class="school-logo" src="./assets/logo.webp" style="width:100px;">
                    <h1 class="school-name">Go-Tegs International School</h1>
                    <div id="dispTerm" style="font-weight:bold; font-style:italic; margin-top:5px;"></div>
                </div>
                <div class="student-info" style="text-align:center;">
                    <p>OFFICIAL ACADEMIC REPORT FOR <br>
                        <span id="dispName" style="text-decoration:underline; font-weight:bold; font-size:20px;"></span>
                    </p>
                    <p><strong>Student ID:</strong> <span id="dispId"></span></p>
                    <p><strong>Date of Birth:</strong> <span id="dispDob"></span></p>
                    <p><strong>Class:</strong> <span id="dispClass"></span></p>
                </div>
                <table class="result-table">
                    <thead><tr><th>Subject</th><th style="text-align:center;">Score (%)</th><th style="text-align:center;">Grade</th></tr></thead>
                    <tbody id="resBody"></tbody>
                </table>
                <table class="summary-table">
                    <tr><td>Total Score</td><td id="resTotal" style="text-align:center;"></td></tr>
                    <tr><td>Mean Percentage</td><td id="resMean" style="text-align:center;"></td></tr>
                    <tr><td>Overall Grade</td><td id="resGrade" style="text-align:center;"></td></tr>
                </table>
                <div class="footer">
                    <div class="timestamp" id="dispTime"></div>
                    <div class="sig-space">
                        <!-- SIGNATURE WITH 20PX MARGIN LEFT & 5PX MARGIN BOTTOM -->
                        <img id="sigImg" src="./assets/signature.png" style="width: 140px; display: block; margin-left: 20px; margin-bottom: 5px; position: relative; z-index: 1;" onerror="this.style.display='none'">
                        <div class="sig-line"></div>
                        <strong style="text-transform: uppercase;">School Principal</strong>
                    </div>
                </div>
            </div>
            <div class="action-btns">
                <button class="download-btn" onclick="window.print()">📥 Print / Save as PDF</button>
                <button class="back-btn" onclick="location.reload()">Check Another</button>
            </div>
        </div>
        <p id="msg"></p>
    </div>

    <!-- Celebration Splash -->
    <div id="splashBox">
        <div class="splash-title"></div>
        <div id="randomComment" class="splash-comment"></div>
    </div>

    <script>
        const subjectNames = {
            maths_score: "Mathematics", english_score: "English Language", physics_score: "Physics", chem_score: "Chemistry", bio_score: "Biology", fmath_score: "Further Mathematics", civic_score: "Civic Education", govt_score: "Government", econs_score: "Economics", markt_score: "Marketing", dp_score: "Data Processing", comme_score: "Commerce", agric_score: "Agricultural Science", crs_score: "C.R.S", finacc_score: "Financial Accounting", litineng_score: "Literature in English", philo_score: "Philosophy", geo_score: "Geography", basic_science_score: "Basic Science", basic_tech_score: "Basic Technology", bus_stud_score: "Business Studies", cmp_score: "Computer Studies", phe_score: "P.H.E", cca_score: "C.C.A", social_stud_score: "Social Studies", home_econs_score: "Home Economics", yoruba_score: "Yoruba", french_score: "French"
        };

        function toggleDept() {
            const cls = document.getElementById('classSelect').value;
            document.getElementById('deptDiv').style.display = cls.includes("SSS") ? "block" : "none";
        }

        function getGrade(score) {
            if (score >= 75) return "A1"; if (score >= 70) return "B2"; if (score >= 65) return "B3"; if (score >= 60) return "C4"; if (score >= 55) return "C5"; if (score >= 50) return "C6"; if (score >= 45) return "D7"; if (score >= 40) return "E8"; return "F9";
        }

        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const dept = document.getElementById('deptSelect').value;
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('checkBtn');

            if(!sid || !yr || !cls || !pin || (cls.includes("SSS") && !dept)) { 
                msg.style.color = "#d97706"; msg.innerText = "⚠️ Please fill all fields"; return; 
            }

            btn.classList.add('loading');
            msg.style.color = "#004a99";
            msg.innerText = "⏳ Connecting to Go-Tegs Database...";

            // Delay sequence
            await new Promise(r => setTimeout(r, 1000));
            msg.innerText = "🔍 Verifying Credentials & Trials...";
            await new Promise(r => setTimeout(r, 1000));
            msg.innerText = "📋 Generating Report Card...";
            await new Promise(r => setTimeout(r, 1000));

            try {
                const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&class=${cls}&dept=${dept}&pin=${pin}`);
                const data = await res.json();

                if (res.status !== 200) {
                    btn.classList.remove('loading');
                    msg.style.color = "red"; msg.innerText = "❌ " + data.error;
                } else {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('dispTerm').innerText = `${yr} ${data.term || "Examination"}`;
                    document.getElementById('dispName').innerText = data.full_name;
                    document.getElementById('dispId').innerText = sid;
                    document.getElementById('dispDob').innerText = data.dob || "---";
                    document.getElementById('dispClass').innerText = cls + (dept ? ` (${dept})` : "");

                    let rows = ""; let total = 0;
                    data.scores.forEach(s => {
                        total += s.score;
                        rows += `<tr><td>${subjectNames[s.subject] || s.subject}</td><td style="text-align:center;">${s.score}</td><td style="text-align:center; font-weight:bold;">${getGrade(s.score)}</td></tr>`;
                    });
                    const mean = (total / data.scores.length).toFixed(2);
                    document.getElementById('resBody').innerHTML = rows;
                    document.getElementById('resTotal').innerText = total;
                    document.getElementById('resMean').innerText = mean + "%";
                    document.getElementById('resGrade').innerText = getGrade(mean);
                    document.getElementById('dispTime').innerText = "Generated: " + new Date().toLocaleString();
                    msg.innerText = "";

                    // Splash Box Logic
                    const splash = document.getElementById('splashBox');
                    const splashTitle = document.querySelector('.splash-title');
                    const splashComment = document.getElementById('randomComment');
                    let title = "", comment = "", bgColor = "";

                    if (mean >= 75) { title = "🌟 Outstanding!"; comment = "Exceptional performance! A true scholar."; bgColor = "#16a34a"; }
                    else if (mean >= 65) { title = "👏 Very Good!"; comment = "Great job! Keep pushing for the top."; bgColor = "#0284c7"; }
                    else if (mean >= 50) { title = "👍 Good Effort!"; comment = "A solid pass. You can do even better!"; bgColor = "#ca8a04"; }
                    else { title = "📚 Stay Focused"; comment = "Don't give up. Work harder next term."; bgColor = "#dc2626"; }

                    splashTitle.innerText = title; splashComment.innerText = comment;
                    splash.style.backgroundColor = bgColor; splash.style.display = 'block';
                    setTimeout(() => { splash.style.display = 'none'; }, 5000);
                }
            } catch (e) { btn.classList.remove('loading'); msg.innerText = "❌ Connection Error."; }
        }
    </script>
</body>
</html>

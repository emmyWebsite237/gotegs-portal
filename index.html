<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        #loginSection { max-width: 400px; margin: 0 auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        
        /* Result Template */
        #pdfArea { padding: 40px; background: white; border: 5px double #004a99; position: relative; }
        .report-header { text-align: center; border-bottom: 2px solid #004a99; padding-bottom: 10px; margin-bottom: 20px; }
        .school-logo { width: 100px; position: absolute; left: 40px; top: 40px; }
        .school-name { font-family: 'Times New Roman', serif; font-size: 30px; color: #004a99; margin: 0; }
        .term-title { font-size: 18px; font-weight: bold; font-style: italic; }
        .student-info { margin: 20px 0; text-align: center; line-height: 1.8; }
        .underline-name { text-decoration: underline; font-weight: bold; font-size: 20px; }

        .result-table, .summary-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td, .summary-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        .summary-table { width: 50%; margin-left: auto; }

        .footer { margin-top: 50px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-space { text-align: center; width: 200px; }
        .sig-line { border-top: 2px solid #000; }
        .timestamp { font-size: 11px; color: #777; }

        .action-btns { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        @media print { .action-btns, #loginSection, #msg { display: none !important; } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginSection">
            <img src="./assets/logo.png" style="width: 100px;" onerror="this.src='https://wordpress.com'">
            <h3>Student Portal</h3>
            <input type="text" id="sid" placeholder="Student ID (GT/...)">
            <select id="yearSelect"><option value="">Select Session</option><option value="2023/2024">2023/2024</option></select>
            <select id="classSelect" onchange="toggleDept()">
                <option value="">Select Class</option>
                <option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option>
                <option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option>
            </select>
            <div id="deptDiv" style="display:none;">
                <select id="deptSelect">
                    <option value="">Select Department</option>
                    <option value="Science">Science</option><option value="Art">Art</option><option value="Commerce">Commerce</option>
                </select>
            </div>
            <input type="password" id="pin" placeholder="Access PIN">
            <button onclick="check()">Check Result</button>
        </div>

        <div id="resultSection" style="display:none;">
            <div id="pdfArea">
                <div class="report-header">
                    <img class="school-logo" src="./assets/logo.png" onerror="this.style.display='none'">
                    <h1 class="school-name">Go-Tegs International School</h1>
                    <div id="dispTerm" class="term-title"></div>
                </div>
                <div class="student-info">
                    <p>School Result of <span id="dispName" class="underline-name"></span></p>
                    <p><strong>DOB:</strong> <span id="dispDob"></span> | <strong>ID:</strong> <span id="dispId"></span></p>
                </div>
                <table class="result-table">
                    <thead><tr><th>Subject</th><th>Score (%)</th><th>Grade</th></tr></thead>
                    <tbody id="resBody"></tbody>
                </table>
                <table class="summary-table">
                    <tr><td>Total Score</td><td id="resTotal"></td></tr>
                    <tr><td>Mean % / Grade</td><td id="resMeanGrade"></td></tr>
                </table>
                <div class="footer">
                    <div class="timestamp" id="dispTime"></div>
                    <div class="sig-space">
                        <img id="sigImg" src="./assets/signature.png" style="width: 120px; margin-bottom: -15px; position: relative;">
                        <div class="sig-line"></div>
                        <strong>Principal</strong>
                    </div>
                </div>
            </div>
            <div class="action-btns">
                <button onclick="window.print()" style="background:#16a34a">Print / PDF</button>
                <button onclick="downloadAsImage()" style="background:#0284c7">Save Image</button>
                <button onclick="location.reload()" style="background:#6b7280">Back</button>
            </div>
        </div>
        <p id="msg"></p>
    </div>

    <script>
        const subjectNames = {
            maths_score: "Mathematics", english_score: "English", physics_score: "Physics", chem_score: "Chemistry",
            bio_score: "Biology", fmath_score: "Further Maths", civic_score: "Civic", govt_score: "Government",
            econs_score: "Economics", markt_score: "Marketing", dp_score: "Data Processing", comme_score: "Commerce",
            agric_score: "Agric", crs_score: "C.R.S", finacc_score: "Financial Account", litineng_score: "Literature",
            philo_score: "Philosophy", geo_score: "Geography", basic_science_score: "Basic Science", cmp_score: "Computer"
        };

        function toggleDept() { 
            const cls = document.getElementById('classSelect').value;
            document.getElementById('deptDiv').style.display = cls.includes("SSS") ? "block" : "none"; 
        }

        function getGrade(s) {
            if(s>=75) return "A1"; if(s>=70) return "B2"; if(s>=65) return "B3"; if(s>=60) return "C4";
            if(s>=55) return "C5"; if(s>=50) return "C6"; if(s>=45) return "D7"; if(s>=40) return "E8"; return "F9";
        }

        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const dept = document.getElementById('deptSelect').value;
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');

            if(!sid || !yr || !cls || !pin) { msg.innerText = "⚠️ Fill all fields"; return; }
            msg.style.color = "#004a99";
            msg.innerText = "⏳ Connecting to Go-Tegs Database...";

            try {
                const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&class=${cls}&dept=${dept}&pin=${pin}`);
                msg.innerText = "🔍 Verifying Credentials & Trials...";
                const data = await res.json();

                if (res.status !== 200) {
                    msg.style.color = "red"; msg.innerText = "❌ " + data.error;
                } else {
                    msg.innerText = "📋 Generating Report Card...";
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    
                    document.getElementById('dispTerm').innerText = `${yr} ${data.term || "Examination"}`;
                    document.getElementById('dispName').innerText = data.full_name;
                    document.getElementById('dispId').innerText = sid;
                    document.getElementById('dispDob').innerText = data.dob || "---";

                    let rows = ""; let total = 0;
                    data.scores.forEach(s => {
                        total += s.score;
                        rows += `<tr><td>${subjectNames[s.subject] || s.subject}</td><td>${s.score}</td><td>${getGrade(s.score)}</td></tr>`;
                    });
                    const mean = (total / data.scores.length).toFixed(2);
                    document.getElementById('resBody').innerHTML = rows;
                    document.getElementById('resTotal').innerText = total;
                    document.getElementById('resMeanGrade').innerText = `${mean}% (${getGrade(mean)})`;
                    document.getElementById('dispTime').innerText = "Generated: " + new Date().toLocaleString();
                    msg.innerText = "✅ Success";
                }
            } catch (e) { msg.innerText = "❌ Error connecting."; }
        }

        async function downloadAsImage() {
            const element = document.getElementById('pdfArea');
            const msg = document.getElementById('msg');
            msg.innerText = "⏳ Preparing Image...";
            html2canvas(element, { scale: 3, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `GoTegs_Result.png`;
                    link.click();
                    msg.innerText = "✅ Saved!";
                }, 'image/png');
            });
        }
    </script>
</body>
</html>

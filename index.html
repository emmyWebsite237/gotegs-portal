<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* MOBILE-FIRST ANIMATED BACKGROUND */
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; overflow-x: hidden; }

        section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: #001f3f; /* Fallback color */
        }

        /* This layer handles the hue animation so it doesn't affect the card content */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/background.jpg') no-repeat;
            background-size: cover;
            background-position: center;
            animation: animateBg 20s linear infinite;
            z-index: 1;
        }

        @keyframes animateBg {
            100% { filter: hue-rotate(360deg); }
        }

        /* PRELOADER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .pulse-loader {
            width: 60px; height: 60px; background: #004a99;
            border-radius: 50%; animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* GLASSMORPHISM CARD */
        .card { 
            position: relative;
            z-index: 10; /* Above the animated background */
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 450px; 
            margin: 20px auto;
            color: white;
            box-sizing: border-box;
        }
        
        #loginSection { text-align: center; }
        
        /* Fixed colors for inputs so hue-rotate doesn't mess with them */
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: none; border-radius: 8px; font-size: 16px; 
            box-sizing: border-box; background: white; color: #333;
        }
        
        button { 
            width: 100%; padding: 14px; background: #004a99; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; 
            font-size: 18px; margin-top: 15px; transition: 0.3s; 
        }

        .admin-link {
            display: block; margin-top: 25px; font-size: 12px;
            color: rgba(255,255,255,0.6); text-decoration: none;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* RESULT TEMPLATE - PDF AREA */
        #pdfArea { 
            padding: 20px; background: white !important; border: 4px double #004a99; 
            margin: 0 auto; position: relative; width: 100%;
            box-sizing: border-box; display: flex; flex-direction: column;
            color: #333; text-align: left;
        }

        .watermark-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 50px; font-weight: bold; color: rgba(0, 0, 0, 0.05);
            white-space: nowrap; pointer-events: none; z-index: 0;
        }

        .school-name { font-family: 'Great Vibes', cursive; font-size: 28px; color: #004a99; margin: 5px 0; }
        .student-info-grid { display: grid; grid-template-columns: 1fr; gap: 5px; margin: 10px 0; border: 1px solid #ddd; padding: 10px; font-size: 12px; }
        .result-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .result-table th, .result-table td { border: 1px solid #333; padding: 5px; }

        /* MOBILE OVERRIDES */
        @media screen and (max-width: 600px) {
            .school-name { font-size: 24px; }
            .card { padding: 20px; width: 95%; }
            #pdfArea { font-size: 12px; }
        }

        /* Loading States */
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: inline-block; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="pulse-loader"></div>
        <p style="color:#004a99; font-weight:bold; margin-top:20px;">LOADING PORTAL...</p>
    </div>

    <section id="mainWrapper" style="opacity: 0;">
        <div class="bg-animate"></div>

        <div class="card">
            <div id="loginSection">
                <img src="./assets/logo.webp" style="width: 100px; filter: none;" onerror="this.src='https://placehold.co/100x100?text=LOGO'">
                <h2 style="margin: 10px 0;">Student Portal</h2>
                
                <input type="text" id="sid" placeholder="Student ID (GT/...)">
                <select id="yearSelect">
                    <option value="">Select Session</option>
                    <option value="2025/2026">2025/2026</option>
                </select>
                <select id="classSelect" onchange="toggleDept()">
                    <option value="">Select Class</option>
                    <option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option>
                    <option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option>
                </select>
                <div id="deptDiv" style="display:none;">
                    <select id="deptSelect">
                        <option value="">Select Department</option>
                        <option value="Science">Science</option><option value="Art">Art</option><option value="Commerce">Commerce</option>
                    </select>
                </div>
                <input type="password" id="pin" placeholder="Access PIN">
                
                <button id="checkBtn" onclick="check()">
                    <span id="btnText">Check Result</span>
                    <div class="spinner"></div>
                </button>

                <p id="msg" style="color: #ffcccc; margin-top: 10px; font-size: 14px;"></p>

                <a href="admin.html" class="admin-link">⚠️ Do not tap: Admin Access Only</a>
            </div>

            <div id="resultSection" style="display:none;">
                <div id="pdfArea">
                    <div id="statusWatermark" class="watermark-overlay">UNOFFICIAL COPY</div>
                    
                    <div style="text-align: center; border-bottom: 2px solid #004a99; padding-bottom: 5px;">
                        <img src="./assets/logo.webp" style="width: 60px;" onerror="this.src='https://placehold.co/60'">
                        <h1 class="school-name">Go-Tegs International School</h1>
                        <div style="font-size: 10px;">15, Ayesanmi Street, Isheri Olofin, Lagos</div>
                    </div>

                    <p id="dispTerm" style="text-align:center; font-weight:bold; margin: 5px 0; color:#004a99;"></p>

                    <div class="student-info-grid">
                        <div><strong>Name:</strong> <span id="dispName"></span></div>
                        <div><strong>Class:</strong> <span id="dispClass"></span></div>
                        <div><strong>ID:</strong> <span id="dispSid"></span></div>
                    </div>

                    <table class="result-table">
                        <thead>
                            <tr style="background: #f0f0f0;">
                                <th>Subject</th>
                                <th>Score</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody id="resBody"></tbody>
                    </table>

                    <div style="margin-top: 10px; font-size: 11px; border: 1px solid #ddd; padding: 5px;">
                        <strong>Principal's Remark:</strong> <span id="dispPrincipal"></span>
                    </div>

                    <div style="margin-top: 15px; text-align: right;">
                        <img id="sigImg" src="./assets/signature.png" style="width: 80px;" onerror="this.style.display='none'">
                        <div style="border-top: 1px solid #000; width: 120px; display: inline-block; margin-top: 5px;"></div>
                        <div style="font-size: 10px; font-weight: bold;">PRINCIPAL</div>
                    </div>
                </div>
                
                <button id="dlBtn" onclick="downloadPDF()" style="background: #28a745;">📥 Download PDF</button>
                <button onclick="location.reload()" style="background:#666; margin-top: 5px;">Go Back</button>
            </div>
        </div>
    </section>

    <script>
        // Preloader Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.display = 'none';
                document.getElementById('mainWrapper').style.opacity = '1';
            }, 1500);
        });

        function toggleDept() {
            const cls = document.getElementById('classSelect').value;
            document.getElementById('deptDiv').style.display = cls.includes("SSS") ? "block" : "none";
        }

        async function check() {
            const sid = document.getElementById('sid').value;
            const pin = document.getElementById('pin').value;
            const btn = document.getElementById('checkBtn');
            const msg = document.getElementById('msg');

            if(!sid || !pin) { msg.innerText = "Enter ID and PIN"; return; }

            btn.classList.add('loading');
            document.getElementById('btnText').innerText = "Verifying...";

            try {
                // Adjust this URL to your actual backend API
                const response = await fetch(`/api/verify?student_id=${sid}&pin=${pin}`);
                const data = await response.json();

                if (response.ok) {
                    showResult(data);
                } else {
                    msg.innerText = data.error || "Login Failed";
                }
            } catch (e) {
                msg.innerText = "Connection Error";
            } finally {
                btn.classList.remove('loading');
                document.getElementById('btnText').innerText = "Check Result";
            }
        }

        function showResult(data) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';

            // Check if paid in Supabase
            const watermark = document.getElementById('statusWatermark');
            if (data.is_paid === true) {
                watermark.innerText = "OFFICIAL COPY";
                watermark.style.color = "rgba(0, 128, 0, 0.05)";
            }

            document.getElementById('dispName').innerText = data.full_name;
            document.getElementById('dispSid').innerText = data.student_id;
            document.getElementById('dispClass').innerText = data.class;
            document.getElementById('dispPrincipal').innerText = data.principal_remark || "Good performance.";
            document.getElementById('dispTerm').innerText = "2025/2026 SECOND TERM REPORT";

            let rows = "";
            data.scores.forEach(s => {
                rows += `<tr><td>${s.subject}</td><td>${s.score}</td><td>${getGrade(s.score)}</td></tr>`;
            });
            document.getElementById('resBody').innerHTML = rows;
        }

        function getGrade(s) {
            if (s >= 75) return "A1";
            if (s >= 60) return "B";
            if (s >= 50) return "C";
            return "F";
        }

        async function downloadPDF() {
            const area = document.getElementById('pdfArea');
            const btn = document.getElementById('dlBtn');
            btn.innerText = "Generating...";

            const canvas = await html2canvas(area, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
            pdf.save("Result.pdf");
            btn.innerText = "📥 Download PDF";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 850px; position: relative; }
        #loginSection { max-width: 400px; margin: 0 auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        /* Button & Spinner Styling */
        button { width: 100%; padding: 14px; background: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; position: relative; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
        .loading { pointer-events: none; opacity: 0.8; }

        /* PDF Area Styling */
        #pdfArea { padding: 40px; background: white !important; border: 5px double #004a99; position: relative; min-height: 950px; width: 100%; box-sizing: border-box; overflow: hidden; }
        #pdfArea::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; background-image: url('./assets/logo.webp'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.08; z-index: 0; }
        .report-header, .student-info, .result-table, .summary-table, .footer { position: relative; z-index: 1; }
        .report-header { text-align: center; border-bottom: 2px solid #004a99; padding-bottom: 10px; margin-bottom: 30px; }
        .school-name { font-family: 'Times New Roman', serif; font-size: 32px; color: #004a99; text-transform: uppercase; margin: 0; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        .summary-table { width: 50%; margin-top: 25px; margin-left: auto; border-collapse: collapse; }
        .summary-table td { border: 1px solid #000; padding: 10px; font-weight: bold; }
        .footer { margin-top: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-space { text-align: center; width: 200px; }
        .sig-line { border-top: 2px solid #000; margin-bottom: 5px; }
        #msg { text-align: center; font-weight: bold; margin-top: 20px; font-size: 16px; }

        @media screen and (max-width: 600px) {
            #pdfArea { width: 800px; transform: scale(0.42); transform-origin: top left; margin-bottom: -550px; }
            .card { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginSection">
            <img src="./assets/logo.webp" style="width: 120px;" onerror="this.src='https://wordpress.com'">
            <h3 style="color: #004a99;">Student Result Portal</h3>
            <input type="text" id="sid" placeholder="Student ID (GT/...)">
            <select id="yearSelect"><option value="">Select Session</option><option value="2025/2026">2025/2026</option></select>
            <select id="classSelect" onchange="toggleDept()">
                <option value="">Select Class</option>
                <option value="JSS 1">JSS 1</option><option value="SSS 1">SSS 1</option>
            </select>
            <div id="deptDiv" style="display:none;"><select id="deptSelect"><option value="">Select Dept</option><option>Science</option><option>Art</option><option>Commerce</option></select></div>
            <input type="password" id="pin" placeholder="Access PIN">
            <button id="checkBtn" onclick="check()"><span class="btn-text">Check Result</span><div class="spinner"></div></button>
        </div>

        <div id="resultSection" style="display:none;">
            <div id="pdfArea">
                <div class="report-header">
                    <img src="./assets/logo.webp" style="width: 100px;">
                    <h1 class="school-name">Go-Tegs International School</h1>
                    <div id="dispTerm" style="font-weight:bold; font-style:italic;"></div>
                </div>
                <div class="student-info" style="text-align:center;">
                    <p>Academic Report for <span id="dispName" style="text-decoration:underline; font-weight:bold;"></span></p>
                    <p>ID: <span id="dispId"></span> | DOB: <span id="dispDob"></span></p>
                </div>
                <table class="result-table">
                    <thead><tr><th>Subject</th><th>Score (%)</th><th>Grade</th></tr></thead>
                    <tbody id="resBody"></tbody>
                </table>
                <table class="summary-table">
                    <tr><td>Total Score</td><td id="resTotal" style="text-align:center;"></td></tr>
                    <tr><td>Mean Percentage</td><td id="resMean" style="text-align:center;"></td></tr>
                </table>
                <div class="footer">
                    <div id="dispTime" style="font-size:11px; color:#777;"></div>
                    <div class="sig-space">
                        <img src="./assets/signature.png" style="width:140px; margin-bottom:-15px; position:relative;">
                        <div class="sig-line"></div>
                        <strong>School Principal</strong>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <button id="dlBtn" onclick="downloadResult()" style="background:#16a34a"><span class="btn-text">📥 Download PDF</span><div class="spinner"></div></button>
                <button onclick="location.reload()" style="background:#6b7280">Back</button>
            </div>
        </div>
        <p id="msg"></p>
    </div>

    <script>
        function toggleDept() {
            const cls = document.getElementById('classSelect').value;
            document.getElementById('deptDiv').style.display = cls.includes("SSS") ? "block" : "none";
        }

        async function check() {
            const btn = document.getElementById('checkBtn');
            const msg = document.getElementById('msg');
            btn.classList.add('loading');
            
            msg.style.color = "#004a99";
            msg.innerText = "⏳ Connecting to Go-Tegs Database...";
            
            await new Promise(r => setTimeout(r, 1000));
            msg.innerText = "🔍 Verifying Credentials & Trials...";
            
            try {
                // ... fetch logic from your verify.js ...
                // Simulate success for now:
                await new Promise(r => setTimeout(r, 1500));
                msg.innerText = "📋 Generating Report Card...";
                await new Promise(r => setTimeout(r, 500));
                
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                msg.innerText = "✅ Success";
            } catch (e) {
                btn.classList.remove('loading');
                msg.innerText = "❌ Error.";
            }
        }

        async function downloadResult() {
            const btn = document.getElementById('dlBtn');
            btn.classList.add('loading');
            const element = document.getElementById('pdfArea');
            const opt = {
                margin: 0,
                filename: 'Result.pdf',
                html2canvas: { scale: 2, useCORS: true, windowWidth: 1000 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => btn.classList.remove('loading'));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* General Page Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 850px; position: relative; }
        
        /* Input Section Styling */
        #loginSection { max-width: 400px; margin: 0 auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #003366; }

        /* RESULT TEMPLATE STYLING (A4 Pro Layout) */
        #pdfArea { 
            padding: 40px; 
            background: white !important; 
            border: 5px double #004a99; 
            margin: 10px auto;
            position: relative;
            min-height: 950px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* WATERMARK LOGIC */
        #pdfArea::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            background-image: url('./assets/logo.webp');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }

        .report-header, .student-info, .result-table, .summary-table, .footer {
            position: relative;
            z-index: 1;
        }

        .report-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        .school-logo { width: 100px; margin-bottom: 10px; }
        .school-name { font-family: 'Times New Roman', Times, serif; font-size: 32px; color: #004a99; margin: 0; text-transform: uppercase; }
        .term-title { font-size: 18px; font-weight: bold; margin-top: 5px; color: #333; }
        
        .student-info { margin: 25px 0; line-height: 1.8; font-size: 16px; }
        .underline-name { text-decoration: underline; font-weight: bold; font-size: 20px; color: #000; }

        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td { border: 1px solid #000; padding: 10px; text-align: left; }
        .result-table th { background: #eef2f7; color: #004a99; }
        
        .summary-table { width: 50%; margin-top: 25px; margin-left: auto; border-collapse: collapse; }
        .summary-table td { border: 1px solid #000; padding: 10px; font-weight: bold; }

        .footer { margin-top: auto; padding-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-space { text-align: center; width: 200px; }
        .sig-line { border-top: 2px solid #000; margin-bottom: 5px; }
        .timestamp { font-size: 11px; color: #777; font-style: italic; }

        .action-btns { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .download-btn { background: #16a34a; }
        .back-btn { background: #6b7280; }
        
        #msg { text-align: center; font-weight: bold; margin-top: 20px; width: 100%; display: block; font-size: 16px; }

        /* MOBILE FIX: Scales View for Screen, but downloadPDF() uses 800px width */
        @media screen and (max-width: 600px) {
            #pdfArea { 
                width: 800px; 
                transform: scale(0.42); 
                transform-origin: top left;
                margin-bottom: -550px;
            }
            .card { overflow-x: auto; padding: 15px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="loginSection">
            <img src="./assets/logo.webp" style="width: 120px;" onerror="this.src='https://wordpress.com'">
            <h3 style="color: #004a99;">Student Result Portal</h3>
            <input type="text" id="sid" placeholder="Student ID (GT/...)">
            
            <select id="yearSelect">
                <option value="">Select Session</option>
                <option value="2025/2026">2025/2026</option>
                <option value="2026/2027">2026/2027</option>
            </select>

            <select id="classSelect" onchange="toggleDept()">
                <option value="">Select Class</option>
                <option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option>
                <option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option>
            </select>

            <div id="deptDiv" style="display:none;">
                <select id="deptSelect">
                    <option value="">Select Department</option>
                    <option value="Science">Science</option>
                    <option value="Art">Art</option>
                    <option value="Commerce">Commerce</option>
                </select>
            </div>

            <input type="password" id="pin" placeholder="Access PIN">
            <button onclick="check()">Check Result</button>
        </div>

        <div id="resultSection" style="display:none;">
            <div id="pdfArea">
                <div class="report-header">
                    <img class="school-logo" src="./assets/logo.webp">
                    <h1 class="school-name">Go-Tegs International School</h1>
                    <div id="dispTerm" class="term-title"></div>
                </div>

                <div class="student-info">
                    <p style="text-align: center;">OFFICIAL ACADEMIC REPORT FOR <br>
                        <span id="dispName" class="underline-name"></span>
                    </p>
                    <p><strong>Student ID:</strong> <span id="dispId"></span></p>
                    <p><strong>Date of Birth:</strong> <span id="dispDob"></span></p>
                    <p><strong>Class:</strong> <span id="dispClass"></span></p>
                </div>

                <table class="result-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th style="text-align:center;">Score (%)</th>
                            <th style="text-align:center;">Grade</th>
                        </tr>
                    </thead>
                    <tbody id="resBody"></tbody>
                </table>

                <table class="summary-table">
                    <tr><td>Total Score</td><td id="resTotal" style="text-align:center;"></td></tr>
                    <tr><td>Mean Percentage</td><td id="resMean" style="text-align:center;"></td></tr>
                    <tr><td>Overall Grade</td><td id="resGrade" style="text-align:center;"></td></tr>
                </table>

                <div class="footer">
                    <div class="timestamp" id="dispTime"></div>
                    <div class="sig-space">
                        <img id="sigImg" src="./assets/signature.png" style="width: 140px; display: block; margin: 0 auto -20px auto; position: relative; z-index: 1;" onerror="this.style.display='none'">
                        <div class="sig-line"></div>
                        <strong style="text-transform: uppercase;">School Principal</strong>
                    </div>
                </div>
            </div>

            <div class="action-btns">
                <button class="download-btn" onclick="downloadResult()">📥 Download Result (PDF)</button>
                <button class="back-btn" onclick="location.reload()">Check Another</button>
            </div>
        </div>

        <p id="msg"></p>
    </div>

    <script>
        const subjectNames = {
            maths_score: "Mathematics", english_score: "English Language", physics_score: "Physics", 
            chem_score: "Chemistry", bio_score: "Biology", fmath_score: "Further Mathematics", 
            civic_score: "Civic Education", govt_score: "Government", econs_score: "Economics", 
            markt_score: "Marketing", dp_score: "Data Processing", comme_score: "Commerce", 
            agric_score: "Agricultural Science", crs_score: "C.R.S", finacc_score: "Financial Accounting", 
            litineng_score: "Literature in English", philo_score: "Philosophy", geo_score: "Geography", 
            basic_science_score: "Basic Science", basic_tech_score: "Basic Technology", 
            bus_stud_score: "Business Studies", cmp_score: "Computer Studies", phe_score: "P.H.E", 
            cca_score: "C.C.A", social_stud_score: "Social Studies", home_econs_score: "Home Economics", 
            yoruba_score: "Yoruba", french_score: "French"
        };

        function toggleDept() {
            const cls = document.getElementById('classSelect').value;
            document.getElementById('deptDiv').style.display = cls.includes("SSS") ? "block" : "none";
        }

        function getGrade(score) {
            if (score >= 75) return "A1"; if (score >= 70) return "B2"; if (score >= 65) return "B3";
            if (score >= 60) return "C4"; if (score >= 55) return "C5"; if (score >= 50) return "C6";
            if (score >= 45) return "D7"; if (score >= 40) return "E8"; return "F9";
        }

        async function downloadResult() {
            const element = document.getElementById('pdfArea');
            const studentName = document.getElementById('dispName').innerText || "Student";
            const msg = document.getElementById('msg');
            
            msg.innerText = "⏳ Generating Official One-Page PDF...";

            const opt = {
                margin: 0,
                filename: `${studentName.replace(/\s+/g, '_')}_Result.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 3, 
                    useCORS: true, 
                    windowWidth: 1000 
                },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                msg.innerText = "✅ Download Complete!";
                setTimeout(() => msg.innerText = "", 3000);
            }).catch(err => {
                msg.innerText = "❌ Download Failed. Please try again.";
                console.error(err);
            });
        }

        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const dept = document.getElementById('deptSelect').value;
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');

            if(!sid || !yr || !cls || !pin || (cls.includes("SSS") && !dept)) { 
                msg.style.color = "#d97706"; msg.innerText = "⚠️ Please fill all fields (check Department)"; return; 
            }

            msg.style.color = "#004a99";
            msg.innerText = "⏳ Connecting to Go-Tegs Database...";

            try {
                const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&class=${cls}&dept=${dept}&pin=${pin}`);
                msg.innerText = "🔍 Verifying Credentials...";
                const data = await res.json();

                if (res.status !== 200) {
                    msg.style.color = "red"; msg.innerText = "❌ " + data.error;
                } else {
                    msg.innerText = "📋 Generating Report Card...";
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    
                    document.getElementById('dispTerm').innerText = `${yr} ${data.term || "Examination"}`;
                    document.getElementById('dispName').innerText = data.full_name;
                    document.getElementById('dispId').innerText = sid;
                    document.getElementById('dispDob').innerText = data.dob || "---";
                    document.getElementById('dispClass').innerText = cls + (dept ? ` (${dept})` : "");

                    let rows = ""; let total = 0;
                    data.scores.forEach(s => {
                        total += s.score;
                        rows += `<tr><td>${subjectNames[s.subject] || s.subject}</td><td style="text-align:center;">${s.score}</td><td style="text-align:center; font-weight:bold;">${getGrade(s.score)}</td></tr>`;
                    });
                    
                    const mean = (total / data.scores.length).toFixed(2);
                    document.getElementById('resBody').innerHTML = rows;
                    document.getElementById('resTotal').innerText = total;
                    document.getElementById('resMean').innerText = mean + "%";
                    document.getElementById('resGrade').innerText = getGrade(mean);
                    document.getElementById('dispTime').innerText = "Printed on: " + new Date().toLocaleString();
                    msg.innerText = "✅ Success";
                }
            } catch (e) { msg.innerText = "❌ Connection Error. Please try again."; }
        }
    </script>
</body>
</html>

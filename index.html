<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Tegs Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dbeafe);
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card {
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:100%;
    max-width:850px;
    box-sizing: border-box; /* Added to keep padding inside max-width */
}

#loginSection {
    max-width:400px;
    margin:auto;
    text-align:center;
}

input,select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
    box-sizing: border-box;
}

input:focus,select:focus{
    outline:none;
    border-color:#004a99;
    box-shadow:0 0 0 2px rgba(0,74,153,0.2);
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#004a99;
    color:white;
    font-weight:bold;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 6px 15px rgba(0,74,153,0.3);
}

button:hover {
    background:#003366;
    transform:translateY(-2px);
}

.action-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.action-btns button:nth-child(2){
    background:#666;
}

.spinner {
    display:none;
    width:20px;
    height:20px;
    border:3px solid rgba(255,255,255,.3);
    border-top-color:white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {to{transform:rotate(360deg);}}

.loading .btn-text{display:none;}
.loading .spinner{display:block;}

#pdfArea {
    padding:25px;
    border:5px double #004a99;
    border-radius:12px;
    background:white;
    position:relative;
}

.school-name {
    font-family:'Great Vibes',cursive;
    font-size:40px;
    color:#004a99;
    text-align:center;
    margin: 10px 0;
}

.report-header {
    border-bottom:2px solid #004a99;
    margin-bottom:10px;
    padding-bottom:10px;
}

.result-table {
    width:100%;
    border-collapse:collapse;
}

.result-table th,
.result-table td {
    border:1px solid black;
    padding:8px;
    font-size:13px;
}

.result-table th {
    background:#eef2f7;
    color:#004a99;
}

.student-info-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    border:1px solid black;
    padding:10px;
    margin-bottom:10px;
    background:#fafafa;
}

.bottom-wrap {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.comments-table,.summary-table {
    width:100%;
    border-collapse:collapse;
}

.comments-table td,
.summary-table td {
    border:1px solid black;
    padding:8px;
    font-size:12px;
}

.footer {
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

.sig-line {
    border-top:2px solid black;
    margin-top:10px;
}

#msg {
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

/* MOBILE VIEWPORT ADJUSTMENT */
@media(max-width:600px){
    .card { padding: 15px; }
    #pdfArea {
        transform: scale(0.45);
        transform-origin: top left;
        width: 850px; /* Fixed width for the internal content */
    }
    #resultSection {
        height: 550px; /* Prevents overlap on mobile due to scaling */
        overflow: hidden;
    }
    .action-btns { flex-direction: column; }
}
</style>
</head>

<body>

<div class="card">
<div id="loginSection">
<img src="./assets/logo.webp" style="width:120px;">
<h3 style="color:#004a99;">Students Result Portal</h3>

<input type="text" id="sid" placeholder="Student ID">
<select id="yearSelect">
<option value="">Session</option>
<option value="2025/2026">2025/2026</option>
</select>

<select id="classSelect" onchange="toggleDept()">
<option value="">Class</option>
<option>JSS 1</option><option>JSS 2</option><option>JSS 3</option>
<option>SSS 1</option><option>SSS 2</option><option>SSS 3</option>
</select>

<div id="deptDiv" style="display:none;">
<select id="deptSelect">
<option value="">Department</option>
<option>Science</option><option>Art</option><option>Commerce</option>
</select>
</div>

<input type="password" id="pin" placeholder="PIN">

<button id="checkBtn" onclick="check()">
<span class="btn-text">Check Result</span>
<div class="spinner"></div>
</button>
</div>

<div id="resultSection" style="display:none;">
<div id="pdfArea">

<div class="report-header">
<h1 class="school-name">Go-Tegs International School</h1>
<p style="text-align:center;font-weight:bold;margin:0;">Training the Leaders of Tomorrow</p>
</div>

<div id="dispTerm" style="text-align:center;font-weight:bold;margin:10px 0;"></div>

<div class="student-info-grid">
<div>Name: <span id="dispName"></span></div>
<div>DOB: <span id="dispDob"></span></div>
<div>Class: <span id="dispClass"></span></div>
<div>Present: <span id="dispPresent"></span></div>
</div>

<table class="result-table">
<thead>
<tr>
<th>Subject</th>
<th>Score</th>
<th>Grade</th>
<th>Remark</th>
</tr>
</thead>
<tbody id="resBody"></tbody>
</table>

<div class="bottom-wrap">
<table class="comments-table">
<tr><td><b>Teacher:</b><br><span id="dispTeacher"></span></td></tr>
<tr><td><b>Principal:</b><br><span id="dispPrincipal"></span></td></tr>
</table>

<table class="summary-table">
<tr><td>Total</td><td id="resTotal"></td></tr>
<tr><td>Mean</td><td id="resMean"></td></tr>
<tr><td>Grade</td><td id="resGrade"></td></tr>
</table>
</div>

<div class="footer">
<div id="dispTime"></div>
<div>
<img src="./assets/signature.png" style="width:100px;">
<div class="sig-line"></div>
<b style="display:block;text-align:center;">Principal</b>
</div>
</div>

</div>

<div class="action-btns">
<button id="dlBtn" onclick="downloadPDF()">Download PDF</button>
<button onclick="location.reload()">Check Another</button>
</div>
</div>

<p id="msg"></p>
</div>

<script>
const CURRENT_TERM="Second Term Report";

function getGradeInfo(score){
if(score>=75)return{g:"A1",c:"Excellent"};
if(score>=60)return{g:"B",c:"Good"};
if(score>=50)return{g:"C",c:"Pass"};
return{g:"F",c:"Fail"};
}

function toggleDept(){
const cls=document.getElementById('classSelect').value;
document.getElementById('deptDiv').style.display=cls.includes("SSS")?"block":"none";
}

async function check(){
// Simple simulation for UI transition
document.getElementById('loginSection').style.display='none';
document.getElementById('resultSection').style.display='block';

document.getElementById('dispName').innerText="Sample Student";
document.getElementById('dispClass').innerText="SSS 1";
document.getElementById('dispTerm').innerText=CURRENT_TERM;

let data=[{subject:"Math",score:80},{subject:"English",score:65}];

let rows="",total=0;
data.forEach(s=>{
total+=s.score;
let g=getGradeInfo(s.score);
rows+=`<tr><td>${s.subject}</td><td>${s.score}</td><td>${g.g}</td><td>${g.c}</td></tr>`;
});

document.getElementById('resBody').innerHTML=rows;
document.getElementById('resTotal').innerText=total;
document.getElementById('resMean').innerText=(total/data.length).toFixed(1);
document.getElementById('resGrade').innerText=getGradeInfo(total/data.length).g;
document.getElementById('dispTime').innerText="Date: " + new Date().toLocaleDateString();
}

async function downloadPDF(){
    const btn = document.getElementById('dlBtn');
    btn.innerText = "Generating...";
    
    const original = document.getElementById('pdfArea');
    
    // Create a clone to force PC format (850px width) regardless of screen size
    const clone = original.cloneNode(true);
    clone.style.width = "850px";
    clone.style.position = "absolute";
    clone.style.left = "-9999px";
    clone.style.top = "0";
    clone.style.transform = "none";
    document.body.appendChild(clone);

    try {
        const canvas = await html2canvas(clone, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save("Student_Result.pdf");
    } catch (e) {
        console.error(e);
    } finally {
        document.body.removeChild(clone);
        btn.innerText = "Download PDF";
    }
}
</script>

</body>
</html>

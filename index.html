<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    
    <!-- NEW PDF ENGINE (Copy this exactly) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 400px; box-sizing: border-box; }
        input, select { width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #eee; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #004a99; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 20px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 18px; display: none; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #004a99; color: white; border-radius: 5px 5px 0 0; }
        .grade-bold { font-weight: bold; color: #004a99; text-align: center; }
        #msg { margin-top: 20px; font-size: 16px; font-weight: 500; }
        .back-btn { background: #666; margin-top: 10px; font-size: 16px; padding: 10px; }
        .download-btn { background: #16a34a; margin-top: 20px; font-size: 18px; }
    </style>
</head>

<body>
    <div class="card">
        <div id="pdfArea">
            <img src="https://gotegs2.wordpress.com/wp-content/uploads/2024/11/cropped-news-gotegs-full.png?w=648" style="max-width: 80%; height: auto; margin-bottom: 10px;">
            
            <div id="loginSection">
                <h3>Result Checker</h3>
                <input type="text" id="sid" placeholder="Student ID (e.g. GT/101)">
                <select id="yearSelect">
                    <option value="">Select Year</option>
                    <option value="2023/2024">2023/2024</option>
                    <option value="2022/2023">2022/2023</option>
                </select>
                <select id="classSelect">
                    <option value="">Select Class</option>
                    <option value="JSS 1">JSS 1</option>
                    <option value="JSS 2">JSS 2</option>
                    <option value="JSS 3">JSS 3</option>
                    <option value="SSS 1">SSS 1</option>
                    <option value="SSS 2">SSS 2</option>
                    <option value="SSS 3">SSS 3</option>
                </select>
                <input type="password" id="pin" placeholder="Enter Result PIN">
                <button onclick="check()">Check Result</button>
            </div>

            <div id="resultSection" style="display:none;">
                <h3 id="studentName" style="color: #333; margin-top: 0;"></h3>
                <table id="resTable">
                    <thead>
                        <tr><th>Subject</th><th style="text-align:center;">Grade</th></tr>
                    </thead>
                    <tbody id="resBody"></tbody>
                </table>
            </div>
        </div>

        <div id="actionButtons" style="display:none;">
            <button class="download-btn" onclick="downloadResult()">📥 Download PDF</button>
            <button class="back-btn" onclick="location.reload()">Check Another</button>
        </div>

        <p id="msg"></p>
    </div>

    <script>
        function getGrade(score) {
            if (score >= 75) return "A1";
            if (score >= 70) return "B2";
            if (score >= 65) return "B3";
            if (score >= 60) return "C4";
            if (score >= 55) return "C5";
            if (score >= 50) return "C6";
            return "F9";
        }

        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const pin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');

            if(!sid || !yr || !cls || !pin) { 
                msg.style.color = "#d97706";
                msg.innerText = "⚠️ Fill all fields"; 
                return; 
            }
            
            msg.style.color = "#4b5563";
            msg.innerText = "⏳ Verifying...";

            const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&student_class=${cls}&pin=${pin}`);
            const data = await res.json();

            if (res.status !== 200) {
                msg.style.color = "#dc2626";
                msg.innerText = "❌ " + data.error;
            } else {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('actionButtons').style.display = 'block';
                document.getElementById('resTable').style.display = 'table';
                document.getElementById('studentName').innerText = data.name;

                let rows = "";
                data.scores.forEach(s => {
                    rows += `<tr>
                                <td>${s.subject}</td>
                                <td class="grade-bold">${getGrade(s.score)}</td>
                             </tr>`;
                });
                document.getElementById('resBody').innerHTML = rows;
                msg.innerText = "";
            }
        }

            function downloadResult() {
    const element = document.getElementById('pdfArea');
    const msg = document.getElementById('msg');
    
    msg.innerText = "⏳ Generating Result View...";

    // This takes a 'snapshot' of the result area
    html2canvas(element, { 
        useCORS: true, 
        scale: 3, // High quality for printing
        backgroundColor: "#ffffff" 
    }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        
        // Open the image in a new tab
        const newTab = window.open();
        newTab.document.write(`
            <html>
                <head><title>Go-Tegs Result</title></head>
                <body style="margin:0; display:flex; flex-direction:column; align-items:center; font-family:sans-serif;">
                    <p style="padding:10px; background:#004a99; color:white; width:100%; text-align:center;">
                        Long-press the image below to "Save" or "Download"
                    </p>
                    <img src="${imgData}" style="max-width:100%; height:auto; box-shadow:0 0 10px rgba(0,0,0,0.2);">
                    <button onclick="window.print()" style="margin-top:20px; padding:15px; background:#16a34a; color:white; border:none; border-radius:5px; font-size:18px;">
                        🖨️ Save as PDF / Print
                    </button>
                </body>
            </html>
        `);
        
        msg.innerText = "✅ Result opened in new tab!";
    }).catch(err => {
        msg.innerText = "❌ Error. Please take a screenshot of your screen.";
        console.error(err);
    });
}

    </script>
</body>
</html>

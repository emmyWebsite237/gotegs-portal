<!DOCTYPE html>
<html>
<head>
    <title>Go-Tegs Student Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://wordpress.com" width="70">
        <h3>Result Checker</h3>
        <input type="text" id="sid" placeholder="Student ID (e.g. GT/101)">
        
        <select id="yearSelect">
            <option value="">Select Year</option>
            <option value="2023/2024">2023/2024</option>
            <option value="2022/2023">2022/2023</option>
        </select>

        <select id="classSelect">
            <option value="">Select Class</option>
            <option value="JSS 1">JSS 1</option>
            <option value="JSS 2">JSS 1</option>
            <option value="JSS 3">JSS 1</option>
            <option value="SSS 1">JSS 1</option>
            <option value="SSS 2">SSS 2</option>
            <option value="SSS 3">SSS 3</option>
            <!-- Add more classes as needed -->
        </select>

        <button onclick="check()">Check Result</button>
        <p id="msg"></p>
    </div>

    <script>
        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const msg = document.getElementById('msg');

            if(!sid || !yr || !cls) { msg.innerText = "Please fill all fields"; return; }
            msg.innerText = "Processing...";

            const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&student_class=${cls}`);
            const data = await res.json();

            if (res.status !== 200) {
                msg.style.color = "red";
                msg.innerText = data.error;
            } else {
                msg.style.color = "green";
                msg.innerText = "Redirecting...";
                window.location.href = data.result_url; 
            }
        }
    </script>
</body>
</html>

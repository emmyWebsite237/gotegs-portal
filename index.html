<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Portal | Result Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #004a99; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #003366; }
        .footer { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://wordpress.com" alt="School Logo" width="80">
    <h2>Student Portal</h2>
    <form id="resultForm">
        <input type="text" placeholder="Student School ID (e.g. GSTC/24/001)" required>
        <input type="text" placeholder="Full Name" required>
        <select required>
            <option value="">Select Class</option>
            <option value="JSS1">JSS 1</option>
            <option value="SSS1">SSS 1</option>
            <!-- Add more classes here -->
        </select>
        <select required>
            <option value="">Select Year</option>
            <option value="2023">2023/2024</option>
            <option value="2024">2024/2025</option>
        </select>
        <button type="submit">Check Result</button>
    </form>
    <p class="footer">Max 3 trials per session.</p>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <!-- 1. This tag is CRUCIAL for making it look right on mobile phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Tegs Student Portal</title>
    <style>
        /* 2. Increased base font size and better padding for fingers */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #f4f7f6; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .card { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 400px; /* Bigger max width for tablets/desktop */
            box-sizing: border-box;
        }

        h3 { 
            font-size: 24px; 
            color: #333; 
            margin-bottom: 25px; 
        }

        /* 3. Larger inputs and selects for easier tapping */
        input, select { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 18px; /* Bigger text inside boxes */
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #004a99;
        }

        /* 4. Massive button for easy clicking */
        button { 
            width: 100%; 
            padding: 18px; 
            background: #004a99; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 20px; 
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,74,153,0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        #msg { 
            margin-top: 20px; 
            font-size: 16px; 
            font-weight: 500;
        }

        img { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://gotegs2.wordpress.com/wp-content/uploads/2024/11/cropped-news-gotegs-full.png?w=648" width="90">
        <h3>Result Checker</h3>
        
        <input type="text" id="sid" placeholder="Student ID (e.g. GT/101)">
        
        <select id="yearSelect">
            <option value="">Select Year</option>
            <option value="2023/2024">2023/2024</option>
            <option value="2022/2023">2022/2023</option>
        </select>

        <select id="classSelect">
            <option value="">Select Class</option>
            <option value="JSS 1">JSS 1</option>
            <option value="JSS 2">JSS 2</option>
            <option value="JSS 3">JSS 3</option>
            <option value="SSS 1">SSS 1</option>
            <option value="SSS 2">SSS 2</option>
            <option value="SSS 3">SSS 3</option>
        </select>

        <input type="password" id="pin" placeholder="Enter Result PIN">

        <button onclick="check()">Check Result</button>
        <p id="msg"></p>
    </div>

    <script>
        async function check() {
            const sid = document.getElementById('sid').value;
            const yr = document.getElementById('yearSelect').value;
            const cls = document.getElementById('classSelect').value;
            const userPin = document.getElementById('pin').value;
            const msg = document.getElementById('msg');

            if(!sid || !yr || !cls || !userPin) { 
                msg.style.color = "#d97706";
                msg.innerText = "⚠️ Please fill all fields"; 
                return; 
            }
            
            msg.style.color = "#4b5563";
            msg.innerText = "⏳ Processing...";

            const res = await fetch(`/api/verify?student_id=${sid}&year=${yr}&student_class=${cls}&pin=${userPin}`);
            const data = await res.json();

            if (res.status !== 200) {
                msg.style.color = "#dc2626";
                msg.innerText = "❌ " + data.error;
            } else {
                msg.style.color = "#16a34a";
                msg.innerText = "✅ Success! Redirecting...";
                window.location.href = data.result_url; 
            }
        }
    </script>
</body>
</html>
